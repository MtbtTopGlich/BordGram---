  <title>BordGram • Мессенджер</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root { --primary:#5C6BFF; --primary-dark:#4F5DE0; --danger:#FF4D5A; --success:#2ECC71; --warning:#F39C12; --accent:#A78BFA; --gold:#F0C45A; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; height:100vh; height:100dvh; overflow:hidden; background:#0B0C10; color:#F0F2F5; }
    body, body[data-theme="dark"] { --bg:#0B0C10; --surface:#1E2028; --surface-light:#282A33; --text:#F0F2F5; --text-secondary:#9CA3AF; --border:rgba(255,255,255,0.08); --shadow:0 20px 40px rgba(0,0,0,0.6); --hover:rgba(92,107,255,0.1); --input-bg:#2A2D37; --msg-own:#5C6BFF; --msg-other:#282A33; }

    .btn { padding:0.8rem 1.5rem; border:none; border-radius:2rem; font-weight:600; cursor:pointer; transition:0.2s; font-size:0.9rem; display:inline-flex; align-items:center; justify-content:center; gap:0.3rem; }

    .avatar { width:40px; height:40px; border-radius:50%; background:var(--surface-light); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; color:white; flex-shrink:0; overflow:hidden; }
    .avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
    .avatar-lg { width:60px; height:60px; font-size:1.5rem; }

    .badge { font-size:0.65rem; padding:0.15rem 0.4rem; border-radius:1rem; font-weight:600; display:inline-block; }
    .badge-creator { background:var(--accent); color:white; }

    .custom-modal-content { background:var(--surface); border-radius:1.5rem; padding:1.5rem; width:90%; max-width:400px; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow); border:1px solid var(--border); animation:fadeSlideUp 0.3s ease; }
    .custom-modal h3 { margin-bottom:1rem; color:var(--text); font-size:1.1rem; }

    .chats-list { flex:1; overflow-y:auto; padding:0.5rem; }

    .chat-item:hover,.chat-item.active { background:var(--hover); }
    .chat-item .chat-info { flex:1; min-width:0; }
    .chat-item .chat-info strong { font-size:0.9rem; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .chat-item .chat-info small { font-size:0.75rem; color:var(--text-secondary); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .chat-area { flex:1; display:flex; flex-direction:column; background:var(--bg); min-width:0; }
    .chat-header { padding:0.7rem 1rem; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; min-height:56px; }
    .chat-header .back-btn { display:none; background:none; border:none; color:var(--primary); font-size:1.5rem; cursor:pointer; padding:0.3rem; margin-right:0.5rem; }
    .chat-header .header-user { display:flex; align-items:center; gap:0.6rem; cursor:pointer; flex:1; min-width:0; }
    .chat-header .header-name { font-weight:600; font-size:0.9rem; }
    .messages-container { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:0.5rem; }
    .message { max-width:85%; padding:0.5rem 0.9rem; border-radius:1rem; animation:fadeIn 0.15s ease-out; word-break:break-word; cursor:pointer; font-size:0.9rem; }
    .message.own { align-self:flex-end; background:var(--msg-own); color:white; border-bottom-right-radius:0.3rem; }
    .message.other { align-self:flex-start; background:var(--msg-other); border-bottom-left-radius:0.3rem; }
    .message .msg-sender { font-size:0.7rem; font-weight:600; margin-bottom:0.2rem; color:var(--primary); }
    .message img { max-width:200px; border-radius:0.7rem; cursor:pointer; display:block; }
    .message .forwarded-label { font-size:0.65rem; opacity:0.7; margin-bottom:0.2rem; }
    .message-input-area { padding:0.5rem 0.8rem; background:var(--surface); display:flex; gap:0.5rem; align-items:center; border-top:1px solid var(--border); flex-shrink:0; }
    .message-input-area input { flex:1; padding:0.6rem 0.8rem; border-radius:1.5rem; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:0.9rem; outline:none; }
    .user-info-panel { width:280px; background:var(--surface); border-left:1px solid var(--border); display:none; flex-direction:column; align-items:center; padding:1.5rem 1rem; gap:0.8rem; overflow-y:auto; flex-shrink:0; }
    .user-info-panel.active { display:flex; }
    .user-info-panel .info-actions { display:flex; flex-direction:column; gap:0.4rem; width:100%; margin-top:0.5rem; }
    .user-info-panel .info-actions button { width:100%; padding:0.5rem; border-radius:1.5rem; border:none; cursor:pointer; font-weight:600; font-size:0.8rem; transition:0.2s; }
    .friend-list-item { display:flex; align-items:center; gap:0.6rem; padding:0.6rem; border-radius:0.8rem; cursor:pointer; transition:0.2s; }
    .friend-list-item:hover { background:var(--hover); }
    .friend-list-item.selected { background:var(--primary); color:white; }
    @media (max-width:768px) {
      .sidebar { position:fixed; left:0; top:0; width:85%; height:100%; height:100dvh; z-index:50; transform:translateX(-100%); box-shadow:var(--shadow); }
      .sidebar.open { transform:translateX(0); }
      .chat-header .back-btn { display:block; }
      .chat-area { width:100%; }
      .user-info-panel { position:fixed; right:0; top:0; height:100%; height:100dvh; z-index:40; width:80%; max-width:300px; box-shadow:var(--shadow); transform:translateX(100%); transition:transform 0.3s ease; }
      .user-info-panel.active { transform:translateX(0); }
    }
  </style>

<body data-theme="dark">
  <div id="authScreen" class="screen active">
    <div class="auth-card">
      <div class="logo"><span class="icon">💬</span><h1>BordGram</h1></div>
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="login">Вход</button>
        <button class="tab-btn" data-tab="register">Регистрация</button>
      </div>
      <form id="loginForm" class="auth-form active">
        <input type="text" id="loginUsername" placeholder="@username или никнейм" required>
        <input type="password" id="loginPassword" placeholder="Пароль" required>
        <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
        <button type="button" id="googleLoginBtn" class="btn btn-google" style="width:100%;">🚀 Войти через Google</button>
        <div id="loginError" class="error-message"></div>
      </form>
      <form id="registerForm" class="auth-form">
        <input type="text" id="regUsername" placeholder="@username (уникальный)" required>
        <div class="hint">Только латиница, цифры и _</div>
        <input type="text" id="regNick" placeholder="Никнейм (отображаемое имя)" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" required>
        <textarea id="regBio" placeholder="О себе" rows="2"></textarea>
        <button type="submit" class="btn btn-primary" style="width:100%;">Создать аккаунт</button>
        <button type="button" id="googleRegBtn" class="btn btn-google" style="width:100%;">🚀 Регистрация через Google</button>
        <div id="regError" class="error-message"></div>
      </form>
    </div>
  </div>
  <div id="notificationContainer" class="notification-container"></div>
  <div id="messengerScreen" class="screen">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="user-info" id="sidebarProfileBtn">
          <div id="currentAvatarContainer" class="avatar"></div>
          <div><strong id="currentNickDisplay"></strong><div id="currentUsernameDisplay" style="font-size:0.75rem;color:var(--primary);"></div></div>
        </div>
        <button class="icon-btn" id="settingsBtn" title="Настройки">⚙️</button>
      </div>
      <div class="search-box" id="searchBoxContainer">
        <input type="text" id="searchUser" placeholder="🔍 Поиск по @username..." autocomplete="off">
        <div id="searchResults" class="search-results"></div>
      </div>
      <div class="chats-list" id="chatsContainer"></div>
      <div style="padding:0.8rem;"><button class="btn btn-outline" id="createGroupBtn" style="width:100%;">👥 Создать группу</button></div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="chat-header" id="chatHeader" style="display:none;">
        <button class="back-btn" id="mobileBackBtn">←</button>
        <div class="header-user" id="headerUserBtn"></div>
        <div style="display:flex;gap:0.3rem;">
          <button class="icon-btn" id="toggleUserInfoBtn">ℹ️</button>
          <button class="icon-btn" id="closeChatBtn">✕</button>
        </div>
      </div>
      <div id="messagesContainer" class="messages-container"><div style="text-align:center;margin-top:30%;opacity:0.5;">💬 Выберите чат</div></div>
      <div class="message-input-area" id="messageInputArea" style="display:none;">
        <input type="file" id="imageInput" accept="image/*" class="file-input-hidden">
        <button class="icon-btn" id="attachBtn">📎</button>
        <input type="text" id="messageInput" placeholder="Сообщение...">
        <button class="btn btn-primary" id="sendBtn" style="padding:0.5rem 1rem;">Отпр.</button>
      </div>
    </div>
    <div class="user-info-panel" id="userInfoPanel">
      <button class="icon-btn" id="infoBackBtn" style="align-self:flex-start;">← Назад</button>
      <div id="infoAvatar" class="avatar avatar-lg"></div>
      <h3 id="infoUsername"></h3><div id="infoUserAt" style="color:var(--primary);"></div>
      <span id="infoBadge"></span>
      <p id="infoBio" style="color:var(--text-secondary);text-align:center;"></p>
      <div class="info-actions">
        <button class="btn btn-primary" id="changeNickBtn">Изменить ник</button>
        <button class="btn btn-warning" id="blockUserBtn">Заблокировать</button>
        <button class="btn btn-danger" id="removeFriendBtn">Удалить из друзей</button>
        <button class="btn btn-success" id="shareContactBtn">Поделиться контактом</button>
      </div>
    </div>
  </div>
  <div id="contextMenu" class="context-menu"></div>
  <div id="customDialog" class="custom-modal">
    <div class="custom-modal-content"><h3 id="dialogTitle"></h3><p id="dialogMessage" style="margin-bottom:0.8rem;color:var(--text-secondary);"></p><input type="text" id="dialogInput" style="display:none;"><div class="custom-modal-buttons"><button class="btn btn-gray" id="dialogCancel">Отмена</button><button class="btn btn-primary" id="dialogConfirm">OK</button></div></div>
  </div>
  <div id="customAlert" class="custom-modal">
    <div class="custom-modal-content"><h3 id="alertTitle"></h3><p id="alertMessage" style="margin-bottom:0.8rem;color:var(--text-secondary);"></p><div class="custom-modal-buttons"><button class="btn btn-primary" id="alertOk">OK</button></div></div>
  </div>
  <div id="createGroupModal" class="custom-modal">
    <div class="custom-modal-content">
      <h3>👥 Создать группу</h3>
      <input type="text" id="groupName" placeholder="Название группы" required>
      <textarea id="groupBio" placeholder="Описание группы" rows="2"></textarea>
      <h4 style="margin:0.5rem 0;">Выберите участников:</h4>
      <div id="groupMemberSelect" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:1rem;padding:0.5rem;"></div>
      <div class="custom-modal-buttons" style="margin-top:1rem;">
        <button class="btn btn-gray" id="cancelGroupBtn">Отмена</button>
        <button class="btn btn-primary" id="confirmGroupBtn">Создать</button>
      </div>
    </div>
  </div>
  <div id="settingsModal" class="custom-modal">
    <div class="custom-modal-content">
      <h3>⚙️ Настройки</h3>
      <input type="text" id="newUsername" placeholder="@username">
      <input type="text" id="newNick" placeholder="Никнейм">
      <textarea id="newBio" rows="2" placeholder="О себе"></textarea>
      <input type="email" id="newEmail" placeholder="Email">
      <input type="password" id="newPassword" placeholder="Пароль">
      <button class="btn btn-primary" id="updateProfileBtn" style="width:100%;">Сохранить</button>
      <div id="profileUpdateMsg" class="error-message"></div>
      <button class="btn btn-danger" id="logoutBtn" style="width:100%;margin-top:0.5rem;">Выйти</button>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js", "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js" } }
  </script>

    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, updateEmail, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCTIzwvGhQy5nZWlBHgCNOPeLbDRktuWtE", authDomain: "bordgram.firebaseapp.com", projectId: "bordgram", storageBucket: "bordgram.firebasestorage.app", messagingSenderId: "260333055054", appId: "1:260333055054:web:a73aac07c442dacd2be71f" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    const CREATOR_USERNAME = "bordgram", CREATOR_PASSWORD = "09823065890dD", MAX_MESSAGES = 146;
    let currentUser = null, currentChatData = null, currentChatId = null, messagesUnsubscribe = null, selectedMembers = new Set(), searchTimeout = null;

    const avatarColors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E2'];
    function getAvatarColor(name) { if(!name) return avatarColors[0]; let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash); return avatarColors[Math.abs(hash)%avatarColors.length]; }
    function getInitial(name) { return name?name.charAt(0).toUpperCase():'?'; }
    function renderAvatar(container, userData) { if(!container||!userData) return; container.innerHTML=''; if(userData.avatar&&userData.avatar.startsWith('data:image')) { const img=document.createElement('img'); img.src=userData.avatar; container.appendChild(img); } else { container.textContent=getInitial(userData.nick||userData.username); container.style.backgroundColor=getAvatarColor(userData.nick||userData.username); } }

    // Google
    document.getElementById('googleLoginBtn').onclick = async () => { try { await signInWithPopup(auth, googleProvider); } catch(e) { document.getElementById('loginError').textContent=e.message; } };
    document.getElementById('googleRegBtn').onclick = async () => { try { await signInWithPopup(auth, googleProvider); } catch(e) { document.getElementById('regError').textContent=e.message; } };

    function showAlert(t,m) { return new Promise(r=>{ document.getElementById('alertTitle').textContent=t; document.getElementById('alertMessage').textContent=m; document.getElementById('customAlert').classList.add('active'); document.getElementById('alertOk').onclick=()=>{document.getElementById('customAlert').classList.remove('active');r();}; }); }
    function showConfirm(t,m) { return new Promise(r=>{ document.getElementById('dialogTitle').textContent=t; document.getElementById('dialogMessage').textContent=m; document.getElementById('dialogInput').style.display='none'; document.getElementById('customDialog').classList.add('active'); document.getElementById('dialogCancel').onclick=()=>{document.getElementById('customDialog').classList.remove('active');r(false);}; document.getElementById('dialogConfirm').onclick=()=>{document.getElementById('customDialog').classList.remove('active');r(true);}; }); }
    function showPrompt(t,m,d='') { return new Promise(r=>{ document.getElementById('dialogTitle').textContent=t; document.getElementById('dialogMessage').textContent=m; const inp=document.getElementById('dialogInput'); inp.style.display='block'; inp.value=d; document.getElementById('customDialog').classList.add('active'); document.getElementById('dialogCancel').onclick=()=>{document.getElementById('customDialog').classList.remove('active');r(null);}; document.getElementById('dialogConfirm').onclick=()=>{document.getElementById('customDialog').classList.remove('active');r(inp.value);}; }); }

    const audioContext = new (window.AudioContext||window.webkitAudioContext)();
    function playMessageSound() { try { const o=audioContext.createOscillator(); const g=audioContext.createGain(); o.connect(g); g.connect(audioContext.destination); o.frequency.setValueAtTime(880,audioContext.currentTime); o.frequency.setValueAtTime(1100,audioContext.currentTime+0.1); o.type='sine'; g.gain.setValueAtTime(0.3,audioContext.currentTime); g.gain.exponentialRampToValueAtTime(0.01,audioContext.currentTime+0.3); o.start(audioContext.currentTime); o.stop(audioContext.currentTime+0.3); } catch(e){} }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const ref = doc(db, 'users', user.uid);
        let snap = await getDoc(ref);
        if (!snap.exists()) {
          const newUser = {
            uid: user.uid,
            username: (user.email?.split('@')[0] || 'user').toLowerCase().replace(/[^a-z0-9_]/g, ''),
            nick: user.displayName || user.email?.split('@')[0] || 'User',
            email: user.email || '',
            avatar: user.photoURL || '',
            bio: '',
            badge: 'user',
            online: true,
            banned: false,
            createdAt: serverTimestamp()
          };
          const existSnap = await getDocs(query(collection(db,'users'), where('username','==',newUser.username), limit(1)));
          if (!existSnap.empty) newUser.username = newUser.username + Math.floor(Math.random()*1000);
          await setDoc(ref, newUser);
          currentUser = newUser;
        } else {
          currentUser = { uid: user.uid, ...snap.data() };
        }
        if (currentUser.banned) { await signOut(auth); await showAlert('Бан','Вы забанены!'); return; }
        if (currentUser.username === CREATOR_USERNAME && currentUser.badge !== 'creator') { await updateDoc(ref, {badge:'creator'}); currentUser.badge='creator'; }
        await updateDoc(ref, { online: true, lastSeen: serverTimestamp() });
        document.getElementById('authScreen').classList.remove('active');
        document.getElementById('messengerScreen').classList.add('active');
        document.getElementById('currentNickDisplay').textContent = currentUser.nick || currentUser.username;
        document.getElementById('currentUsernameDisplay').textContent = '@' + currentUser.username;
        renderAvatar(document.getElementById('currentAvatarContainer'), currentUser);
        loadChats();
      } else {
        document.getElementById('authScreen').classList.add('active');
        document.getElementById('messengerScreen').classList.remove('active');
        if (messagesUnsubscribe) messagesUnsubscribe();
      }
    });

    function loadChats() {
      const q = query(collection(db,'chats'), where('participants','array-contains',currentUser.uid), orderBy('lastMessageTime','desc'));
      onSnapshot(q, async (snap) => {
        const container = document.getElementById('chatsContainer');
        container.innerHTML = '<p style="padding:0.5rem;color:var(--text-secondary);font-size:0.8rem;">Диалоги и группы</p>';
        for (const d of snap.docs) {
          const chat = d.data();
          const isGroup = chat.type === 'group';
          const el = document.createElement('div'); el.className = 'chat-item'; el.onclick = () => openChat(d.id, chat);
          if (isGroup) {
            const av = document.createElement('div'); av.className = 'group-avatar'; av.textContent = getInitial(chat.groupName||'G');
            el.appendChild(av);
            el.innerHTML += `<div class="chat-info"><strong>${chat.groupName||'Группа'}</strong><small>${chat.lastMessage||''}</small></div>`;
          } else {
            const otherId = chat.participants.find(id => id !== currentUser.uid);
            if (!otherId) continue;
            let ud = (await getDoc(doc(db,'users',otherId))).data();
            if (!ud || ud.banned) continue;
            const av = document.createElement('div'); av.className = 'avatar'; renderAvatar(av, ud);
            el.appendChild(av);
            el.innerHTML += `<div class="chat-info"><strong>${ud.nick||ud.username}</strong><small>${chat.lastMessage||''}</small></div>`;
          }
          container.appendChild(el);
        }
      });
    }

    window.openChat = async function(chatId, chatData) {
      if (messagesUnsubscribe) messagesUnsubscribe();
      currentChatId = chatId;
      currentChatData = chatData;
      document.getElementById('chatHeader').style.display = 'flex';
      document.getElementById('messageInputArea').style.display = 'flex';
      const headerDiv = document.getElementById('headerUserBtn');
      if (chatData.type === 'group') {
        headerDiv.innerHTML = `<div class="group-avatar" style="width:36px;height:36px;">${getInitial(chatData.groupName||'G')}</div><div><div class="header-name">${chatData.groupName||'Группа'}</div></div>`;
      } else {
        const otherId = chatData.participants.find(id => id !== currentUser.uid);
        const ud = (await getDoc(doc(db,'users',otherId))).data();
        if (!ud) return;
        headerDiv.innerHTML = `<div class="avatar" style="width:36px;height:36px;"></div><div><div class="header-name">${ud.nick||ud.username}</div><div style="font-size:0.7rem;color:var(--primary);">@${ud.username}</div></div>`;
        renderAvatar(headerDiv.querySelector('.avatar'), ud);
      }
      const ref = collection(db, 'messages', chatId, 'messages');
      messagesUnsubscribe = onSnapshot(query(ref, orderBy('timestamp','asc'), limit(MAX_MESSAGES)), (snap) => {
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        snap.forEach(doc => {
          const m = doc.data();
          const div = document.createElement('div');
          div.className = `message ${m.senderId === currentUser.uid ? 'own' : 'other'}`;
          if (chatData.type === 'group' && m.senderId !== currentUser.uid) {
            div.innerHTML = `<div class="msg-sender">${m.senderName}</div>${m.text||''}`;
          } else {
            div.textContent = m.text||'';
          }
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
      });
      if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    };

    document.getElementById('sendBtn').addEventListener('click', async () => {
      const text = document.getElementById('messageInput').value.trim();
      if (!text || !currentChatId) return;
      await addDoc(collection(db, 'messages', currentChatId, 'messages'), {
        senderId: currentUser.uid,
        senderName: currentUser.nick || currentUser.username,
        text, timestamp: serverTimestamp()
      });
      await updateDoc(doc(db, 'chats', currentChatId), { lastMessage: text.substring(0,30), lastMessageTime: serverTimestamp() });
      document.getElementById('messageInput').value = '';
      playMessageSound();
    });

    // Создание группы
    document.getElementById('createGroupBtn').addEventListener('click', async () => {
      document.getElementById('createGroupModal').classList.add('active');
      const list = document.getElementById('groupMemberSelect');
      list.innerHTML = '<div class="spinner"></div>';
      selectedMembers.clear();
      const chatsSnap = await getDocs(query(collection(db,'chats'), where('participants','array-contains',currentUser.uid)));
      const friendIds = new Set();
      chatsSnap.forEach(d => { d.data().participants.forEach(p => { if(p !== currentUser.uid) friendIds.add(p); }); });
      list.innerHTML = '';
      if (friendIds.size === 0) { list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);">Нет контактов</p>'; return; }
      for (const fid of friendIds) {
        const ud = (await getDoc(doc(db,'users',fid))).data();
        if (!ud || ud.banned) continue;
        const item = document.createElement('div'); item.className = 'friend-list-item';
        const av = document.createElement('div'); av.className = 'avatar'; renderAvatar(av, ud); item.appendChild(av);
        item.innerHTML += `<span>${ud.nick||ud.username}</span><small style="color:var(--primary);margin-left:auto;">@${ud.username}</small>`;
        item.onclick = () => { item.classList.toggle('selected'); if (item.classList.contains('selected')) selectedMembers.add(fid); else selectedMembers.delete(fid); };
        list.appendChild(item);
      }
    });
    document.getElementById('cancelGroupBtn').onclick = () => document.getElementById('createGroupModal').classList.remove('active');
    document.getElementById('confirmGroupBtn').onclick = async () => {
      const name = document.getElementById('groupName').value.trim();
      const bio = document.getElementById('groupBio').value.trim();
      if (!name) return showAlert('Ошибка','Введите название группы');
      if (selectedMembers.size === 0) return showAlert('Ошибка','Выберите участников');
      const participants = [currentUser.uid, ...Array.from(selectedMembers)];
      const chatRef = doc(collection(db, 'chats'));
      await setDoc(chatRef, {
        type: 'group', groupName: name, groupBio: bio,
        participants, createdBy: currentUser.uid,
        lastMessage: '👥 Группа создана!', lastMessageTime: serverTimestamp(), createdAt: serverTimestamp()
      });
      await addDoc(collection(db, 'messages', chatRef.id, 'messages'), {
        senderId: 'system', senderName: 'BordGram',
        text: `👥 Группа "${name}" создана! Участники: ${participants.length}`, timestamp: serverTimestamp()
      });
      document.getElementById('createGroupModal').classList.remove('active');
      document.getElementById('groupName').value = '';
      document.getElementById('groupBio').value = '';
      selectedMembers.clear();
    };

    document.getElementById('settingsBtn').addEventListener('click', () => {
      document.getElementById('settingsModal').classList.add('active');
      document.getElementById('newUsername').value = currentUser?.username||'';
      document.getElementById('newNick').value = currentUser?.nick||'';
      document.getElementById('newBio').value = currentUser?.bio||'';
    });
    document.getElementById('updateProfileBtn').addEventListener('click', async () => {
      const nu = document.getElementById('newUsername').value.trim();
      const nick = document.getElementById('newNick').value.trim();
      const bio = document.getElementById('newBio').value.trim();
      try {
        if (nu && nu !== currentUser.username) {
          const snap = await getDocs(query(collection(db,'users'), where('username','==',nu), limit(1)));
          if (!snap.empty && snap.docs[0].id !== currentUser.uid) throw new Error('@username занят');
          await updateDoc(doc(db,'users',currentUser.uid), {username:nu}); currentUser.username=nu;
        }
        if (nick) { await updateDoc(doc(db,'users',currentUser.uid), {nick}); currentUser.nick=nick; }
        if (bio) { await updateDoc(doc(db,'users',currentUser.uid), {bio}); currentUser.bio=bio; }
        document.getElementById('currentNickDisplay').textContent = currentUser.nick;
        document.getElementById('currentUsernameDisplay').textContent = '@'+currentUser.username;
        document.getElementById('profileUpdateMsg').textContent = '✅ Обновлено!';
        document.getElementById('settingsModal').classList.remove('active');
      } catch(e) { document.getElementById('profileUpdateMsg').textContent = e.message; }
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await updateDoc(doc(db,'users',currentUser.uid), {online:false});
      await signOut(auth);
      document.getElementById('settingsModal').classList.remove('active');
    });

    document.getElementById('mobileBackBtn').addEventListener('click', ()=>document.getElementById('sidebar').classList.toggle('open'));
    document.getElementById('closeChatBtn').addEventListener('click', ()=>{
      currentChatId=null; if(messagesUnsubscribe) messagesUnsubscribe();
      document.getElementById('chatHeader').style.display='none';
      document.getElementById('messageInputArea').style.display='none';
      document.getElementById('messagesContainer').innerHTML='<div style="text-align:center;margin-top:30%;opacity:0.5;">💬 Выберите чат</div>';
    });

    document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('loginForm').classList.toggle('active',b.dataset.tab==='login');document.getElementById('registerForm').classList.toggle('active',b.dataset.tab==='register');}));
    document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const login=document.getElementById('loginUsername').value.trim();const p=document.getElementById('loginPassword').value;try{let s;if(login.startsWith('@')){s=await getDocs(query(collection(db,'users'),where('username','==',login.substring(1)),limit(1)));}else{s=await getDocs(query(collection(db,'users'),where('nick','==',login),limit(1)));if(s.empty)s=await getDocs(query(collection(db,'users'),where('username','==',login),limit(1)));}if(s.empty)throw new Error('Не найден');const d=s.docs[0].data();if(d.banned)throw new Error('Забанен');await signInWithEmailAndPassword(auth,d.email,p);}catch(e){document.getElementById('loginError').textContent=e.message;}});
    document.getElementById('registerForm').addEventListener('submit',async(e)=>{e.preventDefault();const un=document.getElementById('regUsername').value.trim().replace('@','');const nick=document.getElementById('regNick').value.trim();const em=document.getElementById('regEmail').value.trim();const pw=document.getElementById('regPassword').value;if(!/^[a-zA-Z0-9_]+$/.test(un)||un.length<3)return document.getElementById('regError').textContent='@username: 3+ символов';if(pw.length<6)return document.getElementById('regError').textContent='Пароль: 6+ символов';try{const exist=await getDocs(query(collection(db,'users'),where('username','==',un),limit(1)));if(!exist.empty)throw new Error('@username занят');const cred=await createUserWithEmailAndPassword(auth,em,pw);await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,username:un,nick,email:em,avatar:'',bio:document.getElementById('regBio').value.trim(),badge:(un===CREATOR_USERNAME&&pw===CREATOR_PASSWORD)?'creator':'user',online:true,banned:false,createdAt:serverTimestamp()});document.getElementById('regError').textContent='✅ Успешно!';}catch(e){document.getElementById('regError').textContent=e.message;}});

    let touchStartX=0;
    document.getElementById('messengerScreen').addEventListener('touchstart',(e)=>{touchStartX=e.touches[0].clientX;},{passive:true});
    document.getElementById('messengerScreen').addEventListener('touchend',(e)=>{const dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>50){const s=document.getElementById('sidebar');if(dx>0&&!s.classList.contains('open'))s.classList.add('open');else if(dx<0&&s.classList.contains('open'))s.classList.remove('open');}},{passive:true});
  </script>
</body>
</html>
