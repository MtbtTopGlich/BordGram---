    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root { --primary:#5C6BFF; --primary-dark:#4F5DE0; --danger:#FF4D5A; --success:#2ECC71; --warning:#F39C12; --accent:#A78BFA; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; height:100vh; height:100dvh; overflow:hidden; background:#0B0C10; color:#F0F2F5; }
        body[data-theme="dark"] { --bg:#0B0C10; --surface:#1E2028; --surface-light:#282A33; --text:#F0F2F5; --text-secondary:#9CA3AF; --border:rgba(255,255,255,0.08); --shadow:0 20px 40px rgba(0,0,0,0.6); --hover:rgba(92,107,255,0.1); --input-bg:#2A2D37; --msg-own:#5C6BFF; --msg-other:#282A33; }

        .auth-form input,.auth-form textarea { padding:0.8rem 1rem; border:1px solid var(--border); border-radius:1.2rem; background:var(--input-bg); color:var(--text); font-size:0.95rem; outline:none; width:100%; }
        .btn { padding:0.6rem 1.2rem; border:none; border-radius:2rem; font-weight:600; cursor:pointer; transition:0.2s; font-size:0.85rem; display:inline-flex; align-items:center; justify-content:center; gap:0.3rem; }
        .btn-primary { background:var(--primary); color:white; } .btn-outline { background:transparent; color:var(--primary); border:2px solid var(--primary); }
        .btn-danger { background:var(--danger); color:white; } .btn-warning { background:var(--warning); color:white; } .btn-success { background:var(--success); color:white; }
        .btn-google { background:white; color:#1E293B; border:1px solid #ddd; } .error-message { color:var(--danger); font-size:0.8rem; }
        .file-input-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }
        .avatar { width:40px; height:40px; border-radius:50%; background:var(--surface-light); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; color:white; flex-shrink:0; overflow:hidden; } .avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
        .group-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:white; flex-shrink:0; overflow:hidden; } .group-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

        .custom-modal { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); display:none; justify-content:center; align-items:center; z-index:5000; } .custom-modal.active { display:flex; }
        .custom-modal-content { background:var(--surface); border-radius:1.5rem; padding:1.5rem; width:90%; max-width:400px; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow); border:1px solid var(--border); animation:fadeSlideUp 0.3s ease; }
        .custom-modal h3 { margin-bottom:0.8rem; color:var(--text); font-size:1rem; }
        .custom-modal input,.custom-modal textarea { width:100%; padding:0.6rem 0.8rem; border-radius:1rem; border:1px solid var(--border); background:var(--input-bg); color:var(--text); margin-bottom:0.5rem; font-family:inherit; outline:none; font-size:0.85rem; }
        .custom-modal-buttons { display:flex; gap:0.5rem; justify-content:flex-end; margin-top:0.6rem; }

        #messengerScreen { flex-direction:row; position:relative; background:var(--bg); }

        .chats-list { flex:1; overflow-y:auto; padding:0.5rem; }

        .chat-item .chat-info small { font-size:0.7rem; color:var(--text-secondary); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
        .chat-item .delete-chat-btn { display:none; position:absolute; right:0.5rem; top:50%; transform:translateY(-50%); background:var(--danger); color:white; border:none; width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:0.8rem; z-index:5; }
        .chat-item:hover .delete-chat-btn { display:flex; align-items:center; justify-content:center; }
        .chat-area { flex:1; display:flex; flex-direction:column; background:var(--bg); min-width:0; }
        .chat-header { padding:0.6rem 0.8rem; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; min-height:50px; }
        .chat-header .back-btn { display:none; background:none; border:none; color:var(--primary); font-size:1.3rem; cursor:pointer; padding:0.2rem; margin-right:0.4rem; }
        .messages-container { flex:1; overflow-y:auto; padding:0.8rem; display:flex; flex-direction:column; gap:0.4rem; }
        .message { max-width:85%; padding:0.4rem 0.8rem; border-radius:1rem; animation:fadeIn 0.15s ease-out; word-break:break-word; cursor:pointer; font-size:0.85rem; position:relative; }
        .message.own { align-self:flex-end; background:var(--msg-own); color:white; border-bottom-right-radius:0.3rem; }
        .message.other { align-self:flex-start; background:var(--msg-other); border-bottom-left-radius:0.3rem; }
        .message .msg-sender { font-size:0.65rem; font-weight:600; margin-bottom:0.1rem; color:var(--primary); }
        .message img { max-width:200px; border-radius:0.6rem; cursor:pointer; display:block; margin-top:0.2rem; }
        .message .file-attachment { display:flex; align-items:center; gap:0.4rem; padding:0.4rem; background:rgba(255,255,255,0.1); border-radius:0.6rem; margin-top:0.2rem; cursor:pointer; }
        .message.other .file-attachment { background:rgba(0,0,0,0.2); } .message .file-attachment .file-icon { font-size:1.2rem; } .message .file-attachment .file-name { font-size:0.7rem; word-break:break-all; }
        .message .contact-card { display:flex; align-items:center; gap:0.4rem; padding:0.3rem; background:rgba(255,255,255,0.08); border-radius:0.5rem; cursor:pointer; margin-top:0.2rem; }
        .message-input-area { padding:0.4rem 0.6rem; background:var(--surface); display:flex; gap:0.4rem; align-items:center; border-top:1px solid var(--border); flex-shrink:0; }
        .message-input-area input { flex:1; padding:0.5rem 0.7rem; border-radius:1.5rem; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:0.85rem; outline:none; }
        .user-info-panel { width:260px; background:var(--surface); border-left:1px solid var(--border); display:none; flex-direction:column; align-items:center; padding:1.2rem 0.8rem; gap:0.6rem; overflow-y:auto; flex-shrink:0; } .user-info-panel.active { display:flex; }

        .friend-list-item { display:flex; align-items:center; gap:0.5rem; padding:0.5rem; border-radius:0.7rem; cursor:pointer; transition:0.2s; } .friend-list-item:hover { background:var(--hover); } .friend-list-item.selected { background:var(--primary); color:white; }
        .context-menu { position:fixed; background:var(--surface); border:1px solid var(--border); border-radius:0.8rem; padding:0.4rem 0; z-index:3000; min-width:140px; box-shadow:var(--shadow); display:none; }
        .context-menu-item { padding:0.5rem 0.8rem; cursor:pointer; transition:0.2s; color:var(--text); font-size:0.8rem; display:flex; align-items:center; gap:0.4rem; } .context-menu-item:hover { background:var(--hover); }
        .send-file-preview { display:flex; align-items:center; gap:0.4rem; padding:0.4rem; background:var(--surface-light); border-radius:0.8rem; margin-bottom:0.4rem; font-size:0.8rem; } .send-file-preview .remove-file { cursor:pointer; color:var(--danger); font-weight:bold; }
        .friend-request-item { display:flex; align-items:center; gap:0.5rem; padding:0.6rem; background:var(--surface); border:1px solid var(--border); border-radius:1rem; margin-bottom:0.3rem; }
        @media (max-width:768px) { .sidebar { position:fixed; left:0; top:0; width:85%; height:100%; height:100dvh; z-index:50; transform:translateX(-100%); box-shadow:var(--shadow); } .sidebar.open { transform:translateX(0); } .chat-header .back-btn { display:block; } .chat-area { width:100%; } .user-info-panel { position:fixed; right:0; top:0; height:100%; height:100dvh; z-index:40; width:80%; max-width:280px; box-shadow:var(--shadow); transform:translateX(100%); transition:transform 0.3s ease; } .user-info-panel.active { transform:translateX(0); } .chat-item .delete-chat-btn { display:flex; right:0.3rem; } }
    </style>
</head>
<body data-theme="dark">
<div id="authScreen" class="screen"><div class="auth-card"><div class="logo"><span style="font-size:3rem;">💬</span><h1>BordGram</h1></div><div class="tab-buttons"><button class="tab-btn active" data-tab="login">Вход</button><button class="tab-btn" data-tab="register">Регистрация</button></div><form id="loginForm" class="auth-form active"><input type="text" id="loginUsername" placeholder="@username или никнейм" required><input type="password" id="loginPassword" placeholder="Пароль" required><button type="submit" class="btn btn-primary" style="width:100%;">Войти</button><button type="button" id="googleLoginBtn" class="btn btn-google" style="width:100%;">🚀 Войти через Google</button><div id="loginError" class="error-message"></div></form><form id="registerForm" class="auth-form"><input type="text" id="regUsername" placeholder="@username (уникальный)" required><input type="text" id="regNick" placeholder="Никнейм" required><input type="email" id="regEmail" placeholder="Email" required><input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" required><textarea id="regBio" placeholder="О себе" rows="2"></textarea><button type="submit" class="btn btn-primary" style="width:100%;">Создать аккаунт</button><button type="button" id="googleRegBtn" class="btn btn-google" style="width:100%;">🚀 Регистрация через Google</button><div id="regError" class="error-message"></div></form></div></div>

<script type="importmap">{ "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js", "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js" } }</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, limit, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const firebaseConfig = { apiKey: "AIzaSyCTIzwvGhQy5nZWlBHgCNOPeLbDRktuWtE", authDomain: "bordgram.firebaseapp.com", projectId: "bordgram", storageBucket: "bordgram.firebasestorage.app", messagingSenderId: "260333055054", appId: "1:260333055054:web:a73aac07c442dacd2be71f" };
const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); const googleProvider = new GoogleAuthProvider();
const CREATOR_USERNAME = "bordgram", CREATOR_PASSWORD = "09823065890dD", MAX_MESSAGES = 200;
let currentUser = null, currentChatData = null, currentChatId = null, messagesUnsubscribe = null, selectedMembers = new Set(), chatsUnsubscribe = null, pendingFile = null, friendIdsCache = new Set();
const renderedChatsMap = new Map();
let peer = null, currentCall = null;
const avatarColors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E2'];
function getAvatarColor(name) { if(!name) return avatarColors[0]; let hash=0; for(let i=0;i<name.length;i++) hash=name.charCodeAt(i)+((hash<<5)-hash); return avatarColors[Math.abs(hash)%avatarColors.length]; }
function getInitial(name) { return name?name.charAt(0).toUpperCase():'?'; }
function fileToBase64(file) { return new Promise(r=>{ const reader=new FileReader(); reader.onload=()=>r(reader.result); reader.readAsDataURL(file); }); }
function renderAvatar(container, userData) { if(!container||!userData) return; container.innerHTML=''; if(userData.avatar&&userData.avatar.startsWith('data:image')) { const img=document.createElement('img'); img.src=userData.avatar; container.appendChild(img); } else { container.textContent=getInitial(userData.nick||userData.username); container.style.backgroundColor=getAvatarColor(userData.nick||userData.username); } }
function renderGroupAvatar(container, chatData) { if(!container||!chatData) return; container.innerHTML=''; if(chatData.groupAvatar&&chatData.groupAvatar.startsWith('data:image')) { const img=document.createElement('img'); img.src=chatData.groupAvatar; container.appendChild(img); } else { container.textContent=getInitial(chatData.groupName||'G'); } }
function getFileIcon(name) { const ext = name.split('.').pop()?.toLowerCase(); if(['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️'; if(['mp4','webm','mov'].includes(ext)) return '🎬'; if(['mp3','wav','ogg'].includes(ext)) return '🎵'; if(['pdf'].includes(ext)) return '📄'; if(['zip','rar','7z'].includes(ext)) return '📦'; return '📎'; }

document.getElementById('googleLoginBtn').onclick = async () => { try { await signInWithPopup(auth, googleProvider); } catch(e) { document.getElementById('loginError').textContent=e.message; } };
document.getElementById('googleRegBtn').onclick = async () => { try { await signInWithPopup(auth, googleProvider); } catch(e) { document.getElementById('regError').textContent=e.message; } };
function showAlert(t,m) { return new Promise(r=>{ document.getElementById('alertTitle').textContent=t; document.getElementById('alertMessage').textContent=m; document.getElementById('customAlert').classList.add('active'); document.getElementById('alertOk').onclick=()=>{document.getElementById('customAlert').classList.remove('active');r();}; }); }
function showConfirm(t,m) { return new Promise(r=>{ document.getElementById('dialogTitle').textContent=t; document.getElementById('dialogMessage').textContent=m; document.getElementById('dialogInput').style.display='none'; document.getElementById('customDialog').classList.add('active'); document.getElementById('dialogCancel').onclick=()=>{document.getElementById('customDialog').classList.remove('active');r(false);}; document.getElementById('dialogConfirm').onclick=()=>{document.getElementById('customDialog').classList.remove('active');r(true);}; }); }
function showPrompt(t,m,d='') { return new Promise(r=>{ document.getElementById('dialogTitle').textContent=t; document.getElementById('dialogMessage').textContent=m; const inp=document.getElementById('dialogInput'); inp.style.display='block'; inp.value=d; document.getElementById('customDialog').classList.add('active'); document.getElementById('dialogCancel').onclick=()=>{document.getElementById('customDialog').classList.remove('active');r(null);}; document.getElementById('dialogConfirm').onclick=()=>{document.getElementById('customDialog').classList.remove('active');r(inp.value);}; }); }

// Заявки в друзья
async function sendFriendRequest(toUserId) {
    const requestId = `${currentUser.uid}_${toUserId}`;
    await setDoc(doc(db, 'friendRequests', requestId), {
        from: currentUser.uid, fromName: currentUser.nick||currentUser.username, fromAvatar: currentUser.avatar||'',
        to: toUserId, status: 'pending', createdAt: serverTimestamp()
    });
    await showAlert('Готово','Заявка отправлена!');
}
function listenFriendRequests() {
    if(!currentUser) return;
    const q = query(collection(db,'friendRequests'), where('to','==',currentUser.uid), where('status','==','pending'));
    return onSnapshot(q, snap => {
        snap.docChanges().forEach(change => {
            if(change.type === 'added') {
                const data = change.doc.data();
                showFriendRequestNotification(change.doc.id, data.from, data.fromName, data.fromAvatar);
            }
        });
    });
}
function showFriendRequestNotification(requestId, fromUserId, fromName, fromAvatar) {
    const container = document.getElementById('notificationContainer');
    if(document.querySelector(`[data-rid="${requestId}"]`)) return;
    const div = document.createElement('div'); div.className = 'friend-request-item'; div.setAttribute('data-rid', requestId);
    div.innerHTML = `<div class="avatar"></div><div style="flex:1;"><strong style="font-size:0.8rem;">${fromName}</strong><br><small>Хочет добавить в друзья</small></div>`;
    renderAvatar(div.querySelector('.avatar'), {nick:fromName, avatar:fromAvatar});
    const acceptBtn = document.createElement('button'); acceptBtn.textContent='✓'; acceptBtn.className='btn btn-success'; acceptBtn.style.padding='0.3rem 0.6rem'; acceptBtn.style.fontSize='0.7rem';
    acceptBtn.onclick = async () => { await acceptFriendRequest(requestId, fromUserId); div.remove(); };
    const declineBtn = document.createElement('button'); declineBtn.textContent='✕'; declineBtn.className='btn btn-danger'; declineBtn.style.padding='0.3rem 0.6rem'; declineBtn.style.fontSize='0.7rem';
    declineBtn.onclick = async () => { await updateDoc(doc(db,'friendRequests',requestId), {status:'declined'}); div.remove(); };
    div.appendChild(acceptBtn); div.appendChild(declineBtn); container.appendChild(div);
    setTimeout(() => div.remove(), 20000);
}
async function acceptFriendRequest(requestId, fromUserId) {
    await updateDoc(doc(db,'friendRequests',requestId), {status:'accepted'});
    const chatId = [currentUser.uid, fromUserId].sort().join('_');
    await setDoc(doc(db,'chats',chatId), {participants:[currentUser.uid,fromUserId], type:'private', lastMessage:'🎉 Теперь вы друзья!', lastMessageTime:serverTimestamp(), createdAt:serverTimestamp()}, {merge:true});
    await addDoc(collection(db,'messages',chatId,'messages'), {senderId:'system',senderName:'BordGram',text:'🎉 Вы теперь друзья! Начните общение.',timestamp:serverTimestamp()});
    await updateFriendIdsCache();
}

// Контекстное меню
function showContextMenu(e, message) {
    const menu = document.getElementById('contextMenu'); menu.innerHTML = '';
    if (message.senderId === currentUser.uid) {
        const editItem = document.createElement('div'); editItem.className = 'context-menu-item'; editItem.textContent = '✏️ Редактировать';
        editItem.onclick = () => { editMessage(message); hideContextMenu(); }; menu.appendChild(editItem);
        const delItem = document.createElement('div'); delItem.className = 'context-menu-item'; delItem.textContent = '🗑️ Удалить';
        delItem.onclick = () => { deleteMessage(message.id); hideContextMenu(); }; menu.appendChild(delItem);
    }
    menu.style.display = 'block'; menu.style.left = Math.min(e.clientX, window.innerWidth-150)+'px'; menu.style.top = Math.min(e.clientY, window.innerHeight-120)+'px';
    setTimeout(() => document.addEventListener('click', hideContextMenu, { once: true }), 0);
}
function hideContextMenu() { document.getElementById('contextMenu').style.display = 'none'; }
async function editMessage(message) { const newText = await showPrompt('Редактировать','Новый текст:',message.text||''); if(newText !== null && newText !== message.text) await updateDoc(doc(db,'messages',currentChatId,'messages',message.id), {text: newText}); }
async function deleteMessage(messageId) { if(await showConfirm('Удалить','Вы уверены?')) await deleteDoc(doc(db,'messages',currentChatId,'messages',messageId)); }

function showFilePreview(file) { pendingFile = file; const preview = document.getElementById('filePreview'); preview.style.display = 'flex'; preview.innerHTML = `<div class="send-file-preview"><span>${file.type.startsWith('image/')?'🖼️':getFileIcon(file.name)} ${file.name}</span><span class="remove-file" onclick="document.getElementById('fileInput').value='';document.getElementById('imageInput').value='';document.getElementById('filePreview').style.display='none';pendingFile=null;">✕</span></div>`; }
document.getElementById('attachBtn').addEventListener('click', () => { document.getElementById('fileInput').click(); });
document.getElementById('fileInput').addEventListener('change', (e) => { const file = e.target.files[0]; if (file) showFilePreview(file); });
document.getElementById('imageInput').addEventListener('change', (e) => { const file = e.target.files[0]; if (file) showFilePreview(file); });

// WebRTC звонки
function initPeer() { if (peer) peer.destroy(); const peerId = currentUser.uid.substring(0, 10); peer = new Peer(peerId); peer.on('open', (id) => { console.log('PeerJS готов:', id); }); peer.on('call', async (call) => { await handleIncomingCall(call); }); peer.on('error', (err) => { console.error('PeerJS ошибка:', err); }); }
async function handleIncomingCall(call) {
    const usersSnap = await getDocs(collection(db,'users')); let caller = null;
    usersSnap.forEach(ds => { if (ds.id.substring(0, 10) === call.peer) caller = ds.data(); });
    if (!caller) return;
    document.getElementById('callerName').textContent = caller.nick || caller.username;
    renderAvatar(document.getElementById('callerAvatar'), caller);
    const modal = document.getElementById('incomingCallModal'); modal.style.display = 'flex';
    document.getElementById('acceptCallBtn').onclick = async () => { modal.style.display = 'none'; try { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); call.answer(stream); call.on('stream', (remoteStream) => { currentCall = call; }); } catch(e) { showAlert('Ошибка','Нет доступа к микрофону'); } };
    document.getElementById('declineCallBtn').onclick = () => { modal.style.display = 'none'; call.close(); };
}
async function startCall(targetUserId) { try { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); const call = peer.call(targetUserId.substring(0, 10), stream); call.on('stream', (remoteStream) => { currentCall = call; }); currentCall = call; showAlert('Звонок','Вызов отправлен...'); } catch(e) { showAlert('Ошибка','Проверьте микрофон'); } }

// Основная авторизация (исправлено - без мигания)
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const ref = doc(db, 'users', user.uid); let snap = await getDoc(ref);
        if (!snap.exists()) {
            const newUser = { uid: user.uid, username: (user.email?.split('@')[0]||'user').toLowerCase().replace(/[^a-z0-9_]/g,''), nick: user.displayName||user.email?.split('@')[0]||'User', email: user.email||'', avatar: user.photoURL||'', bio: '', badge: 'user', online: true, banned: false, createdAt: serverTimestamp() };
            const existSnap = await getDocs(query(collection(db,'users'), where('username','==',newUser.username), limit(1)));
            if (!existSnap.empty) newUser.username += Math.floor(Math.random()*1000);
            await setDoc(ref, newUser); currentUser = newUser;
        } else currentUser = { uid: user.uid, ...snap.data() };
        if (currentUser.banned) { await signOut(auth); return; }
        if (currentUser.username === CREATOR_USERNAME && currentUser.badge !== 'creator') { await updateDoc(ref, {badge:'creator'}); currentUser.badge='creator'; }
        await updateDoc(ref, { online: true, lastSeen: serverTimestamp() });
        // Сразу показываем мессенджер
        document.getElementById('authScreen').classList.remove('active');
        document.getElementById('messengerScreen').classList.add('active');
        updateSidebarUI();
        document.getElementById('adminPanelBtn').style.display = currentUser.badge === 'creator' ? 'flex' : 'none';
        await updateFriendIdsCache();
        loadChats();
        listenFriendRequests();
        initPeer();
    } else {
        // Очищаем всё при выходе
        document.getElementById('messengerScreen').classList.remove('active');
        document.getElementById('authScreen').classList.add('active');
        if (messagesUnsubscribe) messagesUnsubscribe();
        if (chatsUnsubscribe) chatsUnsubscribe();
        renderedChatsMap.clear();
        friendIdsCache.clear();
        document.getElementById('chatsContainer').innerHTML = '<p style="color:var(--text-secondary);padding:1rem;font-size:0.8rem;">💬 Диалоги и группы</p>';
        currentUser = null; currentChatId = null; currentChatData = null;
        if (peer) peer.destroy();
        if (currentCall) currentCall.close();
    }
});

async function updateFriendIdsCache() {
    friendIdsCache.clear();
    if(!currentUser) return;
    const chatsSnap = await getDocs(query(collection(db,'chats'), where('participants','array-contains',currentUser.uid)));
    chatsSnap.forEach(d => { if(d.data().type !== 'group') { d.data().participants.forEach(p => { if(p !== currentUser.uid) friendIdsCache.add(p); }); } });
}

function updateSidebarUI() { if (!currentUser) return; document.getElementById('currentNickDisplay').textContent = currentUser.nick||currentUser.username; document.getElementById('currentUsernameDisplay').textContent = '@'+currentUser.username; renderAvatar(document.getElementById('currentAvatarContainer'), currentUser); }

function loadChats() {
    if (chatsUnsubscribe) chatsUnsubscribe();
    if(!currentUser) return;
    const q = query(collection(db,'chats'), where('participants','array-contains',currentUser.uid), orderBy('lastMessageTime','desc'));
    chatsUnsubscribe = onSnapshot(q, async (snap) => {
        const container = document.getElementById('chatsContainer');
        const currentIds = new Set();
        for (const d of snap.docs) {
            const chatData = d.data(); const chatId = d.id; currentIds.add(chatId);
            if (renderedChatsMap.has(chatId)) { continue; }
            const el = document.createElement('div'); el.className = 'chat-item'; el.dataset.chatId = chatId;
            el.onclick = (e) => { if(!e.target.classList.contains('delete-chat-btn')) openChat(chatId, chatData); };
            if (chatData.type === 'group') {
                const av = document.createElement('div'); av.className = 'group-avatar'; renderGroupAvatar(av, chatData); el.appendChild(av);
                el.innerHTML += `<div class="chat-info"><strong>${chatData.groupName||'Группа'}</strong><small>${chatData.lastMessage||''}</small></div>`;
            } else {
                const otherId = chatData.participants.find(id => id !== currentUser.uid); if (!otherId) continue;
                let ud = (await getDoc(doc(db,'users',otherId))).data(); if (!ud || ud.banned) continue;
                const av = document.createElement('div'); av.className = 'avatar'; renderAvatar(av, ud); el.appendChild(av);
                el.innerHTML += `<div class="chat-info"><strong>${ud.nick||ud.username}</strong><small>${chatData.lastMessage||''}</small></div>`;
            }
            // Кнопка удаления чата
            const delBtn = document.createElement('button'); delBtn.className = 'delete-chat-btn'; delBtn.textContent = '✕';
            delBtn.onclick = async (e) => { e.stopPropagation(); if(await showConfirm('Удалить чат','Вы уверены?')) { await deleteDoc(doc(db,'chats',chatId)); } };
            el.appendChild(delBtn);
            container.appendChild(el); renderedChatsMap.set(chatId, el);
        }
        for (const [id, el] of renderedChatsMap) { if (!currentIds.has(id)) { el.remove(); renderedChatsMap.delete(id); } }
    });
}

async function addFriend(targetUserId) { await sendFriendRequest(targetUserId); }

window.openChat = async function(chatId, chatData) {
    if (messagesUnsubscribe) messagesUnsubscribe(); currentChatId = chatId; currentChatData = chatData;
    document.getElementById('chatHeader').style.display = 'flex'; document.getElementById('messageInputArea').style.display = 'flex';
    document.getElementById('openGroupSettingsBtn').style.display = chatData.type === 'group' ? 'block' : 'none';
    document.getElementById('toggleUserInfoBtn').style.display = chatData.type !== 'group' ? 'block' : 'none';
    document.getElementById('callBtn').style.display = chatData.type !== 'group' ? 'block' : 'none';
    const headerDiv = document.getElementById('headerUserBtn');
    if (chatData.type === 'group') {
        headerDiv.innerHTML = `<div class="group-avatar" style="width:32px;height:32px;"></div><div><div class="header-name">${chatData.groupName||'Группа'}</div></div>`;
        renderGroupAvatar(headerDiv.querySelector('.group-avatar'), chatData);
        headerDiv.onclick = () => document.getElementById('openGroupSettingsBtn').click();
    } else {
        const otherId = chatData.participants.find(id => id !== currentUser.uid);
        const ud = (await getDoc(doc(db,'users',otherId))).data(); if (!ud) return;
        headerDiv.innerHTML = `<div class="avatar" style="width:32px;height:32px;"></div><div><div class="header-name">${ud.nick||ud.username}</div><div style="font-size:0.65rem;color:var(--primary);">@${ud.username}</div></div>`;
        renderAvatar(headerDiv.querySelector('.avatar'), ud); updateUserInfoPanel(ud);
        document.getElementById('callBtn').onclick = () => startCall(otherId);
    }
    const ref = collection(db, 'messages', chatId, 'messages');
    messagesUnsubscribe = onSnapshot(query(ref, orderBy('timestamp','asc'), limit(MAX_MESSAGES)), (snap) => {
        const container = document.getElementById('messagesContainer'); container.innerHTML = '';
        snap.forEach(doc => {
            const m = doc.data(); const div = document.createElement('div');
            div.className = `message ${m.senderId === currentUser.uid ? 'own' : 'other'}`; div.dataset.messageId = doc.id;
            if (m.type === 'image' && m.imageUrl) { div.innerHTML = (chatData.type==='group'&&m.senderId!==currentUser.uid?`<div class="msg-sender">${m.senderName}</div>`:''); const img = document.createElement('img'); img.src = m.imageUrl; img.style.maxWidth='200px'; img.style.borderRadius='0.6rem'; img.onclick = () => { document.getElementById('previewImage').src=m.imageUrl; document.getElementById('imagePreviewModal').classList.add('active'); }; div.appendChild(img); if (m.text) { const txt = document.createElement('div'); txt.textContent = m.text; txt.style.marginTop='0.2rem'; div.appendChild(txt); } }
            else if (m.type === 'file' && m.fileData) { div.innerHTML = (chatData.type==='group'&&m.senderId!==currentUser.uid?`<div class="msg-sender">${m.senderName}</div>`:''); const fileDiv = document.createElement('div'); fileDiv.className = 'file-attachment'; fileDiv.innerHTML = `<span class="file-icon">${getFileIcon(m.fileName||'')}</span><span class="file-name">${m.fileName||'Файл'}</span>`; fileDiv.onclick = () => { const a = document.createElement('a'); a.href = m.fileData; a.download = m.fileName||'file'; a.click(); }; div.appendChild(fileDiv); if (m.text) { const txt = document.createElement('div'); txt.textContent = m.text; txt.style.marginTop='0.2rem'; div.appendChild(txt); } }
            else if (m.type === 'contact_share' && m.contactData) { div.innerHTML = (chatData.type==='group'&&m.senderId!==currentUser.uid?`<div class="msg-sender">${m.senderName}</div>`:'') + `<div class="contact-card"><div class="avatar" style="width:32px;height:32px;"></div><span>${m.contactData.nick||m.contactData.username}</span></div>`; const cardAv = div.querySelector('.avatar'); if(cardAv) renderAvatar(cardAv, m.contactData); div.querySelector('.contact-card').onclick = () => { if(m.contactData?.uid) openChat(m.contactData.uid, {participants:[currentUser.uid,m.contactData.uid]}); }; }
            else { div.textContent = (chatData.type==='group'&&m.senderId!==currentUser.uid?m.senderName+': ':'')+(m.text||''); }
            div.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, m); }; container.appendChild(div);
        }); container.scrollTop = container.scrollHeight;
    });
    if (window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('userInfoPanel').classList.remove('active'); }
};

async function sendMessage(text, fileData, fileName) { if (!currentChatId) return; const msg = { senderId: currentUser.uid, senderName: currentUser.nick||currentUser.username, timestamp: serverTimestamp() }; if (text) msg.text = text; if (fileData) { if (fileName && (fileName.match(/\.(jpg|jpeg|png|gif|webp|svg)$/i))) { msg.type = 'image'; msg.imageUrl = fileData; } else { msg.type = 'file'; msg.fileData = fileData; msg.fileName = fileName||'file'; } } else { msg.type = 'text'; } await addDoc(collection(db, 'messages', currentChatId, 'messages'), msg); const lastMsg = fileData ? (msg.type==='image'?'📷 Фото':'📎 '+ (fileName||'Файл')) : text.substring(0,30); await updateDoc(doc(db, 'chats', currentChatId), { lastMessage: lastMsg, lastMessageTime: serverTimestamp() }); }
document.getElementById('sendBtn').addEventListener('click', async () => { const text = document.getElementById('messageInput').value.trim(); const imageFile = document.getElementById('imageInput').files[0]; const otherFile = document.getElementById('fileInput').files[0]; const file = imageFile || otherFile || pendingFile; if (!text && !file) return; let fileData = null, fileName = null; if (file) { fileData = await fileToBase64(file); fileName = file.name; } await sendMessage(text || null, fileData, fileName); document.getElementById('messageInput').value = ''; document.getElementById('fileInput').value = ''; document.getElementById('imageInput').value = ''; document.getElementById('filePreview').style.display = 'none'; pendingFile = null; });
document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('sendBtn').click(); } });

// Группы
document.getElementById('createGroupBtn').addEventListener('click', async () => { document.getElementById('createGroupModal').classList.add('active'); const list = document.getElementById('groupMemberSelect'); list.innerHTML = ''; selectedMembers.clear(); await updateFriendIdsCache(); for (const fid of friendIdsCache) { const ud = (await getDoc(doc(db,'users',fid))).data(); if(!ud||ud.banned) continue; const item = document.createElement('div'); item.className = 'friend-list-item'; const av = document.createElement('div'); av.className = 'avatar'; renderAvatar(av, ud); item.appendChild(av); item.innerHTML += `<span style="font-size:0.8rem;">${ud.nick||ud.username}</span>`; item.onclick = () => { item.classList.toggle('selected'); if(item.classList.contains('selected')) selectedMembers.add(fid); else selectedMembers.delete(fid); }; list.appendChild(item); } });
document.getElementById('cancelGroupBtn').onclick = () => document.getElementById('createGroupModal').classList.remove('active');
document.getElementById('confirmGroupBtn').onclick = async () => { const name = document.getElementById('groupName').value.trim()||'Новая группа'; if(selectedMembers.size===0) return showAlert('Ошибка','Выберите участников'); const avatarFile = document.getElementById('groupAvatarInput').files[0]; let groupAvatar = ''; if(avatarFile) groupAvatar = await fileToBase64(avatarFile); const chatRef = doc(collection(db, 'chats')); await setDoc(chatRef, { type:'group', groupName:name, groupBio:document.getElementById('groupBio').value.trim(), groupAvatar, participants:[currentUser.uid,...Array.from(selectedMembers)], createdBy:currentUser.uid, lastMessage:'👥 Группа создана!', lastMessageTime:serverTimestamp(), createdAt:serverTimestamp() }); document.getElementById('createGroupModal').classList.remove('active'); };

document.getElementById('openGroupSettingsBtn').addEventListener('click', async () => { if(!currentChatData||currentChatData.type!=='group') return; document.getElementById('groupSettingsModal').classList.add('active'); document.getElementById('editGroupName').value = currentChatData.groupName||''; const membersList = document.getElementById('groupMembersList'); membersList.innerHTML = ''; for(const pid of currentChatData.participants) { const ud = (await getDoc(doc(db,'users',pid))).data(); if(!ud) continue; const div = document.createElement('div'); div.className = 'friend-list-item'; const av = document.createElement('div'); av.className = 'avatar'; renderAvatar(av, ud); div.appendChild(av); div.innerHTML += `<span style="font-size:0.8rem;">${ud.nick||ud.username} ${pid===currentChatData.createdBy?'👑':''}</span>`; if(pid!==currentUser.uid && currentChatData.createdBy===currentUser.uid) { const kickBtn = document.createElement('button'); kickBtn.textContent='Удалить'; kickBtn.className='btn btn-danger'; kickBtn.style.padding='0.2rem 0.4rem'; kickBtn.style.fontSize='0.65rem'; kickBtn.onclick = async () => { await updateDoc(doc(db,'chats',currentChatId),{participants:arrayRemove(pid)}); currentChatData.participants = currentChatData.participants.filter(p=>p!==pid); document.getElementById('openGroupSettingsBtn').click(); }; div.appendChild(kickBtn); } membersList.appendChild(div); } const addList = document.getElementById('addMembersList'); addList.innerHTML = ''; await updateFriendIdsCache(); for(const fid of friendIdsCache) { if (currentChatData.participants.includes(fid)) continue; const ud = (await getDoc(doc(db,'users',fid))).data(); if(!ud) continue; const item = document.createElement('div'); item.className = 'friend-list-item'; item.innerHTML = `<div class="avatar"></div><span style="font-size:0.8rem;">${ud.nick||ud.username}</span>`; renderAvatar(item.querySelector('.avatar'), ud); item.onclick = async () => { await updateDoc(doc(db,'chats',currentChatId),{participants:arrayUnion(fid)}); currentChatData.participants.push(fid); document.getElementById('openGroupSettingsBtn').click(); }; addList.appendChild(item); } });
document.getElementById('saveGroupBtn').addEventListener('click', async () => { const name = document.getElementById('editGroupName').value.trim(); const avatarFile = document.getElementById('editGroupAvatarInput').files[0]; const updates = {}; if(name) updates.groupName = name; if(avatarFile) updates.groupAvatar = await fileToBase64(avatarFile); if(Object.keys(updates).length) await updateDoc(doc(db,'chats',currentChatId), updates); document.getElementById('groupSettingsModal').classList.remove('active'); });
document.getElementById('leaveGroupBtn').addEventListener('click', async () => { if(await showConfirm('Выйти','Вы уверены?')) { await updateDoc(doc(db,'chats',currentChatId),{participants:arrayRemove(currentUser.uid)}); document.getElementById('groupSettingsModal').classList.remove('active'); document.getElementById('closeChatBtn').click(); } });

function updateUserInfoPanel(userData) { document.getElementById('infoNick').textContent = userData.nick||userData.username; document.getElementById('infoUsername').textContent = '@'+userData.username; document.getElementById('infoBadge').innerHTML = userData.badge==='creator'?'<span class="badge badge-creator">Создатель</span>':(userData.badge==='verified'?'<span class="badge badge-verified">Verified</span>':''); document.getElementById('infoBio').textContent = userData.bio||'Био отсутствует'; document.getElementById('infoStatus').textContent = userData.online?'🟢 В сети':'⚫ Не в сети'; renderAvatar(document.getElementById('infoAvatar'), userData); document.getElementById('removeFriendBtn').style.display = friendIdsCache.has(userData.uid) ? 'flex' : 'none'; ['changeNickBtn','blockUserBtn','removeFriendBtn','shareContactBtn'].forEach(id => document.getElementById(id).dataset.uid = userData.uid); }
document.getElementById('toggleUserInfoBtn').addEventListener('click', () => document.getElementById('userInfoPanel').classList.toggle('active'));
document.getElementById('infoBackBtn').addEventListener('click', () => document.getElementById('userInfoPanel').classList.remove('active'));
document.getElementById('changeNickBtn').addEventListener('click', async () => { const uid = document.getElementById('changeNickBtn').dataset.uid; const newNick = await showPrompt('Изменить ник','Новый ник:'); if(newNick?.trim()) { await updateDoc(doc(db,'users',uid),{nick:newNick.trim()}); if(currentChatData?.participants.includes(uid)) { updateUserInfoPanel((await getDoc(doc(db,'users',uid))).data()); } await showAlert('Готово','Ник изменён!'); } });
document.getElementById('blockUserBtn').addEventListener('click', async () => { const uid = document.getElementById('blockUserBtn').dataset.uid; if(await showConfirm('Заблокировать','Вы уверены?')) { await updateDoc(doc(db,'users',uid),{banned:true}); document.getElementById('closeChatBtn').click(); await showAlert('Готово','Заблокирован!'); } });
document.getElementById('removeFriendBtn').addEventListener('click', async () => { const uid = document.getElementById('removeFriendBtn').dataset.uid; if(await showConfirm('Удалить','Вы уверены?')) { await deleteDoc(doc(db,'chats',[currentUser.uid,uid].sort().join('_'))); await updateFriendIdsCache(); document.getElementById('closeChatBtn').click(); document.getElementById('userInfoPanel').classList.remove('active'); await showAlert('Готово','Удалён!'); } });
document.getElementById('shareContactBtn').addEventListener('click', async () => { const uid = document.getElementById('shareContactBtn').dataset.uid; const contactData = (await getDoc(doc(db,'users',uid))).data(); if(!contactData) return; await showFriendSelect('Поделиться контактом', async (friend) => { const chatId = [currentUser.uid,friend.uid].sort().join('_'); await addDoc(collection(db,'messages',chatId,'messages'),{senderId:currentUser.uid,senderName:currentUser.nick||currentUser.username,type:'contact_share',contactData:{uid:contactData.uid,username:contactData.username,nick:contactData.nick,avatar:contactData.avatar||''},timestamp:serverTimestamp()}); await setDoc(doc(db,'chats',chatId),{participants:[currentUser.uid,friend.uid],lastMessage:'📤 Контакт',lastMessageTime:serverTimestamp()},{merge:true}); await showAlert('Готово','Контакт отправлен!'); }); });
async function showFriendSelect(title, callback) { document.getElementById('friendSelectTitle').textContent = title; const list = document.getElementById('friendSelectList'); list.innerHTML = ''; document.getElementById('friendSelectModal').classList.add('active'); await updateFriendIdsCache(); if(friendIdsCache.size === 0) { list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:1rem;">Нет контактов</p>'; return; } for(const fid of friendIdsCache) { const ud = (await getDoc(doc(db,'users',fid))).data(); if(!ud||ud.banned) continue; const item = document.createElement('div'); item.className = 'friend-list-item'; const av = document.createElement('div'); av.className = 'avatar'; renderAvatar(av, ud); item.appendChild(av); item.innerHTML += `<span style="font-size:0.8rem;">${ud.nick||ud.username}</span>`; item.onclick = () => { document.getElementById('friendSelectModal').classList.remove('active'); callback(ud); }; list.appendChild(item); } }
document.getElementById('friendSelectCancel').addEventListener('click', () => document.getElementById('friendSelectModal').classList.remove('active'));

// Поиск с заявками
async function searchUsers(term) { const rc = document.getElementById('searchResults'); if(!term||term.length<1){rc.style.display='none';return;} rc.style.display='block'; rc.innerHTML='<div class="spinner"></div>'; const sl = term.startsWith('@')?term.substring(1).toLowerCase():term.toLowerCase(); const usersSnap = await getDocs(collection(db,'users')); const results = []; usersSnap.forEach(ds=>{const u=ds.data();if(!u.banned&&u.uid!==currentUser?.uid&&(u.username.toLowerCase().includes(sl)||(u.nick||'').toLowerCase().includes(term.toLowerCase())))results.push(u);}); rc.innerHTML=''; if(!results.length){rc.innerHTML='<p style="padding:0.5rem;text-align:center;color:var(--text-secondary);font-size:0.8rem;">Не найдено</p>';return;} await updateFriendIdsCache(); results.slice(0,8).forEach(u=>{const item=document.createElement('div');item.className='chat-item';const av=document.createElement('div');av.className='avatar';renderAvatar(av,u);item.appendChild(av);item.innerHTML+=`<div style="flex:1;"><strong style="font-size:0.8rem;">${u.nick||u.username}</strong><br><small style="color:var(--primary);font-size:0.65rem;">@${u.username}</small></div>`; if(friendIdsCache.has(u.uid)){const openBtn=document.createElement('button');openBtn.textContent='💬';openBtn.style.cssText='background:var(--primary);border:none;color:white;padding:0.2rem 0.5rem;border-radius:1rem;cursor:pointer;font-size:0.8rem;margin-left:auto;';openBtn.onclick=(e)=>{e.stopPropagation();rc.style.display='none';openChat([currentUser.uid,u.uid].sort().join('_'),{participants:[currentUser.uid,u.uid]});};item.appendChild(openBtn);}else{const addBtn=document.createElement('button');addBtn.textContent='+';addBtn.style.cssText='background:var(--success);border:none;color:white;padding:0.2rem 0.5rem;border-radius:1rem;cursor:pointer;font-size:1rem;margin-left:auto;';addBtn.onclick=(e)=>{e.stopPropagation();rc.style.display='none';addFriend(u.uid);};item.appendChild(addBtn);}rc.appendChild(item);}); }
let searchTimeout; document.getElementById('searchUser').addEventListener('input',(e)=>{clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>searchUsers(e.target.value.trim()),300);}); document.addEventListener('click',(e)=>{if(!document.getElementById('searchBoxContainer').contains(e.target))document.getElementById('searchResults').style.display='none';});

// Админка
async function loadAdminPanel(search='') { const usersSnap = await getDocs(collection(db,'users')); const container = document.getElementById('adminUsersList'); container.innerHTML = ''; const sl = search.toLowerCase(); usersSnap.forEach(ds => { const u = ds.data(); if(u.banned) return; if(u.uid === currentUser.uid) return; if(search && !u.username.toLowerCase().includes(sl) && !(u.nick||'').toLowerCase().includes(sl)) return; const div = document.createElement('div'); div.className='friend-list-item'; const av = document.createElement('div'); av.className='avatar'; renderAvatar(av,u); div.appendChild(av); div.innerHTML += `<div style="flex:1;"><strong style="font-size:0.8rem;">${u.nick||u.username}</strong><br><small style="color:var(--primary);font-size:0.65rem;">@${u.username}</small> ${u.badge==='verified'?'<span class="badge badge-verified">Verified</span>':''}</div>`; const vb = document.createElement('button'); vb.textContent=u.badge==='verified'?'Снять':'Вериф.'; vb.className='btn btn-success'; vb.style.padding='0.2rem 0.4rem'; vb.style.fontSize='0.65rem'; vb.onclick = async () => { await updateDoc(doc(db,'users',u.uid),{badge:u.badge==='verified'?'user':'verified'}); loadAdminPanel(search); }; const bb = document.createElement('button'); bb.textContent='Бан'; bb.className='btn btn-warning'; bb.style.padding='0.2rem 0.4rem'; bb.style.fontSize='0.65rem'; bb.onclick = async () => { await updateDoc(doc(db,'users',u.uid),{banned:true}); loadAdminPanel(search); }; div.appendChild(vb); div.appendChild(bb); container.appendChild(div); }); }
document.getElementById('adminPanelBtn').addEventListener('click', () => { document.getElementById('adminModal').classList.add('active'); loadAdminPanel(); });
document.getElementById('adminSearch').addEventListener('input', (e) => loadAdminPanel(e.target.value));

// Настройки
document.getElementById('settingsBtn').addEventListener('click', () => { document.getElementById('settingsModal').classList.add('active'); document.getElementById('newUsername').value = currentUser?.username || ''; document.getElementById('newNick').value = currentUser?.nick || ''; document.getElementById('newBio').value = currentUser?.bio || ''; });
document.getElementById('updateProfileBtn').addEventListener('click', async () => { const nu = document.getElementById('newUsername').value.trim(); const nick = document.getElementById('newNick').value.trim(); const bio = document.getElementById('newBio').value.trim(); const avatarFile = document.getElementById('changeAvatarInput').files[0]; try { if(nu && nu !== currentUser.username) { const snap = await getDocs(query(collection(db,'users'), where('username','==',nu), limit(1))); if(!snap.empty && snap.docs[0].id !== currentUser.uid) throw new Error('@username занят'); await updateDoc(doc(db,'users',currentUser.uid), {username:nu}); currentUser.username = nu; } if(nick) { await updateDoc(doc(db,'users',currentUser.uid), {nick}); currentUser.nick = nick; } if(bio) { await updateDoc(doc(db,'users',currentUser.uid), {bio}); currentUser.bio = bio; } if(avatarFile) { const b64 = await fileToBase64(avatarFile); await updateDoc(doc(db,'users',currentUser.uid), {avatar:b64}); currentUser.avatar = b64; } updateSidebarUI(); document.getElementById('profileUpdateMsg').textContent = '✅ Обновлено!'; setTimeout(() => document.getElementById('settingsModal').classList.remove('active'), 1000); } catch(e) { document.getElementById('profileUpdateMsg').textContent = e.message; } });
document.getElementById('logoutBtn').addEventListener('click', async () => { await updateDoc(doc(db,'users',currentUser.uid), {online:false}); await signOut(auth); });

document.getElementById('mobileBackBtn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('closeChatBtn').addEventListener('click', () => { currentChatId=null; currentChatData=null; if(messagesUnsubscribe)messagesUnsubscribe(); document.getElementById('chatHeader').style.display='none'; document.getElementById('messageInputArea').style.display='none'; document.getElementById('openGroupSettingsBtn').style.display='none'; document.getElementById('toggleUserInfoBtn').style.display='none'; document.getElementById('callBtn').style.display='none'; document.getElementById('messagesContainer').innerHTML='<div style="text-align:center;margin-top:30%;opacity:0.5;">💬 Выберите чат</div>'; document.getElementById('userInfoPanel').classList.remove('active'); });

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('loginForm').classList.toggle('active',b.dataset.tab==='login');document.getElementById('registerForm').classList.toggle('active',b.dataset.tab==='register');}));
document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const login=document.getElementById('loginUsername').value.trim();const p=document.getElementById('loginPassword').value;try{let s;if(login.startsWith('@')){s=await getDocs(query(collection(db,'users'),where('username','==',login.substring(1)),limit(1)));}else{s=await getDocs(query(collection(db,'users'),where('nick','==',login),limit(1)));if(s.empty)s=await getDocs(query(collection(db,'users'),where('username','==',login),limit(1)));}if(s.empty)throw new Error('Не найден');const d=s.docs[0].data();if(d.banned)throw new Error('Забанен');await signInWithEmailAndPassword(auth,d.email,p);}catch(e){document.getElementById('loginError').textContent=e.message;}});
document.getElementById('registerForm').addEventListener('submit',async(e)=>{e.preventDefault();const un=document.getElementById('regUsername').value.trim().replace('@','');const nick=document.getElementById('regNick').value.trim();const em=document.getElementById('regEmail').value.trim();const pw=document.getElementById('regPassword').value;if(!/^[a-zA-Z0-9_]+$/.test(un)||un.length<3)return document.getElementById('regError').textContent='@username: 3+ символов';if(pw.length<6)return document.getElementById('regError').textContent='Пароль: 6+ символов';try{const exist=await getDocs(query(collection(db,'users'),where('username','==',un),limit(1)));if(!exist.empty)throw new Error('@username занят');const cred=await createUserWithEmailAndPassword(auth,em,pw);await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,username:un,nick,email:em,avatar:'',bio:document.getElementById('regBio').value.trim(),badge:(un===CREATOR_USERNAME&&pw===CREATOR_PASSWORD)?'creator':'user',online:true,banned:false,createdAt:serverTimestamp()});document.getElementById('regError').textContent='✅ Успешно!';}catch(e){document.getElementById('regError').textContent=e.message;}});

let touchStartX=0; document.getElementById('messengerScreen').addEventListener('touchstart',(e)=>{touchStartX=e.touches[0].clientX;},{passive:true}); document.getElementById('messengerScreen').addEventListener('touchend',(e)=>{const dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>50){const s=document.getElementById('sidebar');if(dx>0&&!s.classList.contains('open'))s.classList.add('open');else if(dx<0&&s.classList.contains('open'))s.classList.remove('open');}},{passive:true});
['settingsModal','createGroupModal','groupSettingsModal','adminModal','customDialog','customAlert','imagePreviewModal','friendSelectModal','incomingCallModal'].forEach(id=>document.getElementById(id).addEventListener('click',(e)=>{if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('active');}));
</script>
</body>
</html>
