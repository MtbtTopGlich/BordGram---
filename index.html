<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
  <title>BordGram</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#6366F1;--primary-dark:#4F46E5;--danger:#EF4444;--success:#10B981;--warning:#F59E0B;--bg:#0F172A;--surface:#1E293B;--text:#F1F5F9;--text2:#94A3B8;--border:rgba(148,163,184,0.1);--hover:rgba(99,102,241,0.1);--input:#1E293B}
    body{font-family:system-ui,-apple-system,sans-serif;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text)}
    .screen{height:100dvh;width:100%;display:none;flex-direction:column}
    .screen.active{display:flex}
    #authScreen{justify-content:center;align-items:center;background:radial-gradient(ellipse at top,var(--primary-dark),var(--bg))}
    .auth-card{width:90%;max-width:400px;background:var(--surface);padding:2rem 1.5rem;border-radius:24px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);border:1px solid var(--border);animation:slideUp 0.4s ease}
    .logo{text-align:center;margin-bottom:1.5rem;font-size:3rem}
    .logo h1{font-size:1.8rem;background:linear-gradient(135deg,var(--primary),#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:0.5rem}
    .tabs{display:flex;background:var(--bg);border-radius:50px;padding:4px;margin-bottom:1.5rem}
    .tab-btn{flex:1;padding:10px;border:none;background:none;border-radius:50px;font-weight:600;color:var(--text2);cursor:pointer;font-size:0.9rem;transition:0.3s}
    .tab-btn.active{background:var(--primary);color:#fff}
    .form{display:none;flex-direction:column;gap:0.8rem}
    .form.active{display:flex}
    input,textarea{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:var(--input);color:var(--text);font-size:0.95rem;outline:none;font-family:inherit}
    input:focus,textarea:focus{border-color:var(--primary)}
    .hint{font-size:0.7rem;color:var(--text2);margin-top:-4px;padding-left:4px}
    .btn{padding:12px 20px;border:none;border-radius:50px;font-weight:600;cursor:pointer;font-size:0.9rem;text-align:center;transition:0.2s}
    .btn-p{background:var(--primary);color:#fff}
    .btn-p:active{background:var(--primary-dark)}
    .btn-o{background:none;color:var(--primary);border:2px solid var(--primary)}
    .btn-d{background:var(--danger);color:#fff}
    .btn-s{background:var(--success);color:#fff}
    .btn-w{background:var(--warning);color:#fff}
    .btn-sm{padding:8px 16px;font-size:0.8rem}
    .err{color:var(--danger);font-size:0.85rem;text-align:center}
    .hidden-input{display:none}
    .avatar{width:42px;height:42px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-lg{width:70px;height:70px;font-size:1.8rem}
    .badge{font-size:0.6rem;padding:2px 8px;border-radius:50px;font-weight:600}
    .badge-c{background:linear-gradient(135deg,#8B5CF6,#6366F1);color:#fff}
    .badge-v{background:var(--primary);color:#fff}
    .icon-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:8px;color:var(--text);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .icon-btn:active{background:var(--hover)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:none;justify-content:center;align-items:center;z-index:9999}
    .modal-overlay.active{display:flex}
    .modal{background:var(--surface);border-radius:20px;padding:1.5rem;width:90%;max-width:420px;max-height:80vh;overflow-y:auto;border:1px solid var(--border);animation:slideUp 0.3s ease}
    .modal h3{margin-bottom:1rem;font-size:1.1rem}
    .modal input,.modal textarea{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--input);color:var(--text);margin-bottom:0.6rem;font-family:inherit;outline:none;font-size:0.9rem}
    .modal-btns{display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.8rem}
    .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto}
    .bottom-nav{display:none;background:var(--surface);border-top:1px solid var(--border);padding:6px 10px;padding-bottom:max(6px,env(safe-area-inset-bottom));justify-content:space-around;align-items:center;z-index:100;flex-shrink:0}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 10px;border-radius:10px;color:var(--text2);border:none;background:none;font-family:inherit;font-size:0.65rem;font-weight:500;transition:0.2s}
    .nav-item.active{color:var(--primary)}
    .nav-item svg{width:22px;height:22px}
    .tab-content{flex:1;overflow:hidden;display:none;flex-direction:column}
    .tab-content.active{display:flex}
    #messengerScreen{flex-direction:row}
    .sidebar{background:var(--surface);display:flex;flex-direction:column;height:100%}
    .sidebar-header{padding:1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .profile-info{display:flex;align-items:center;gap:0.6rem;cursor:pointer}
    .search-box{padding:0.8rem 1rem;position:relative}
    .search-box input{width:100%;padding:10px 14px;border-radius:50px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:0.9rem;outline:none}
    .search-results{position:absolute;top:100%;left:1rem;right:1rem;background:var(--surface);border-radius:14px;box-shadow:0 20px 40px rgba(0,0,0,0.5);max-height:250px;overflow-y:auto;z-index:110;border:1px solid var(--border);display:none;animation:slideUp 0.2s ease}
    .chats-list{flex:1;overflow-y:auto;padding:0.3rem}
    .chat-item{display:flex;align-items:center;gap:0.6rem;padding:10px 12px;border-radius:12px;cursor:pointer;transition:0.2s;margin-bottom:1px}
    .chat-item:hover{background:var(--hover)}
    .chat-item.active{background:var(--hover);border-left:3px solid var(--primary)}
    .chat-info{flex:1;min-width:0}
    .chat-info strong{font-size:0.9rem;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .chat-info small{font-size:0.7rem;color:var(--text2);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg)}
    .chat-header{padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
    .chat-header .header-user{display:flex;align-items:center;gap:10px;cursor:pointer;flex:1;min-width:0}
    .messages-container{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:4px}
    .message{max-width:80%;padding:8px 14px;border-radius:18px;animation:msgIn 0.2s ease;word-break:break-word;cursor:pointer;font-size:0.9rem;line-height:1.4}
    .message.own{align-self:flex-end;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border-bottom-right-radius:6px}
    .message.other{align-self:flex-start;background:#334155;border-bottom-left-radius:6px}
    .message img{max-width:200px;border-radius:12px;cursor:pointer;display:block}
    .message .fwd{font-size:0.6rem;opacity:0.7;margin-bottom:2px}
    .message .contact-card{display:flex;align-items:center;gap:8px;padding:6px;background:rgba(255,255,255,0.06);border-radius:10px;cursor:pointer}
    .input-area{padding:8px 12px;background:var(--surface);display:flex;gap:8px;align-items:center;border-top:1px solid var(--border);flex-shrink:0}
    .input-area input{flex:1;padding:10px 14px;border-radius:50px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:0.9rem;outline:none}
    .user-info-panel{background:var(--surface);display:none;flex-direction:column;align-items:center;padding:2rem 1rem;gap:0.8rem;overflow-y:auto;height:100%}
    .user-info-panel .actions{display:flex;flex-direction:column;gap:5px;width:100%;margin-top:0.5rem}
    .actions button{width:100%;padding:10px;border-radius:50px;border:none;cursor:pointer;font-weight:600;font-size:0.85rem;transition:0.2s}
    .friend-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:0.2s}
    .friend-item:hover{background:var(--hover)}
    .notification-container{position:fixed;top:1rem;right:1rem;z-index:2000;display:flex;flex-direction:column;gap:0.5rem;width:280px;pointer-events:none}
    .notification-container>*{pointer-events:auto}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:768px){
      .bottom-nav{display:flex}
      .desktop-sidebar{display:none}
      #messengerScreen{flex-direction:column}
      .user-info-panel{position:fixed;right:0;top:0;width:80%;max-width:300px;z-index:50;box-shadow:-10px 0 30px rgba(0,0,0,0.3);height:100dvh}
      .chat-header{padding:6px 10px}
      .messages-container{padding:0.8rem}
      .message{max-width:88%;font-size:0.85rem}
      .input-area{padding:6px 8px}
    }
    @media(min-width:769px){
      .desktop-sidebar{width:320px;border-right:1px solid var(--border);display:flex}
      .chat-area{flex:1}
      .user-info-panel{width:280px;border-left:1px solid var(--border)}
    }
  </style>
</head>
<body>
  <div id="authScreen" class="screen active">
    <div class="auth-card">
      <div class="logo">💬<h1>BordGram</h1></div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchAuthTab('login')">Вход</button>
        <button class="tab-btn" onclick="switchAuthTab('register')">Регистрация</button>
      </div>
      <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
        <input type="text" id="loginUsername" placeholder="@username или никнейм" required>
        <input type="password" id="loginPassword" placeholder="Пароль" required>
        <button type="submit" class="btn btn-p" style="width:100%">Войти</button>
        <div id="loginError" class="err"></div>
      </form>
      <form id="registerForm" class="form" onsubmit="handleRegister(event)">
        <input type="text" id="regUsername" placeholder="@username (уникальный)" required>
        <div class="hint">Латиница, цифры, _, от 3 символов</div>
        <input type="text" id="regNick" placeholder="Никнейм (имя)" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" required>
        <textarea id="regBio" placeholder="О себе" rows="2"></textarea>
        <div style="display:flex;align-items:center;gap:8px">
          <button type="button" class="btn btn-o btn-sm" onclick="document.getElementById('regAvatarInput').click()">📸 Аватар</button>
          <span id="regAvatarName" style="font-size:0.8rem;color:var(--text2)">Не выбрано</span>
          <input type="file" id="regAvatarInput" accept="image/*" class="hidden-input" onchange="document.getElementById('regAvatarName').textContent=this.files[0]?.name||'Не выбрано'">
        </div>
        <button type="submit" class="btn btn-p" style="width:100%">Зарегистрироваться</button>
        <div id="regError" class="err"></div>
      </form>
    </div>
  </div>

  <div id="notificationContainer" class="notification-container"></div>

  <div id="messengerScreen" class="screen">
    <div class="desktop-sidebar sidebar">
      <div class="sidebar-header">
        <div class="profile-info" onclick="openSettings()">
          <div id="dAvatar" class="avatar"></div>
          <div><strong id="dNick"></strong><br><span style="font-size:0.75rem;color:var(--primary)" id="dAt"></span></div>
        </div>
        <button class="icon-btn" onclick="openSettings()">⚙️</button>
      </div>
      <div class="search-box">
        <input type="text" id="dSearch" placeholder="🔍 Поиск..." oninput="handleSearch('dSearch','dSearchResults')">
        <div id="dSearchResults" class="search-results"></div>
      </div>
      <div class="chats-list" id="dChats"><p style="color:var(--text2);padding:1rem;font-size:0.85rem">💬 Диалоги</p></div>
    </div>

    <div class="tab-content active" id="tab-chats">
      <div class="sidebar" style="height:100%">
        <div class="sidebar-header">
          <div class="profile-info" onclick="openSettings()">
            <div id="mAvatar" class="avatar"></div>
            <div><strong id="mNick"></strong><br><span style="font-size:0.75rem;color:var(--primary)" id="mAt"></span></div>
          </div>
          <button class="icon-btn" onclick="openSettings()">⚙️</button>
        </div>
        <div class="search-box">
          <input type="text" id="mSearch" placeholder="🔍 Поиск..." oninput="handleSearch('mSearch','mSearchResults')">
          <div id="mSearchResults" class="search-results"></div>
        </div>
        <div class="chats-list" id="mChats"><p style="color:var(--text2);padding:1rem;font-size:0.85rem">💬 Диалоги</p></div>
      </div>
    </div>
    <div class="tab-content" id="tab-search">
      <div class="sidebar" style="height:100%">
        <div class="sidebar-header"><h3>🔍 Поиск</h3></div>
        <div style="padding:0.8rem 1rem">
          <input type="text" id="tSearch" placeholder="Введите @username..." oninput="handleSearch('tSearch','tSearchResults')">
          <div id="tSearchResults" style="margin-top:0.5rem;max-height:calc(100dvh - 150px);overflow-y:auto"></div>
        </div>
      </div>
    </div>
    <div class="tab-content" id="tab-settings">
      <div style="padding:1.5rem;overflow-y:auto;height:100%">
        <h3>⚙️ Настройки</h3>
        <label style="font-size:0.85rem;margin-top:0.5rem">@username</label>
        <input type="text" id="sUsername" style="margin-bottom:0.3rem">
        <label style="font-size:0.85rem">Никнейм</label>
        <input type="text" id="sNick" style="margin-bottom:0.3rem">
        <label style="font-size:0.85rem">О себе</label>
        <textarea id="sBio" rows="2" style="margin-bottom:0.3rem"></textarea>
        <div style="display:flex;align-items:center;gap:8px;margin:0.5rem 0">
          <button class="btn btn-o btn-sm" onclick="document.getElementById('sAvatarInput').click()">📸 Аватар</button>
          <span id="sAvatarName" style="font-size:0.8rem;color:var(--text2)">Не выбрано</span>
          <input type="file" id="sAvatarInput" accept="image/*" class="hidden-input" onchange="document.getElementById('sAvatarName').textContent=this.files[0]?.name||'Не выбрано'">
        </div>
        <button class="btn btn-p" onclick="saveSettings()" style="width:100%;margin-bottom:0.3rem">Сохранить</button>
        <div id="sMsg" class="err"></div>
        <div id="sAdmin" style="display:none;margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem">
          <h4>Админ-панель</h4>
          <input type="text" id="sAdminSearch" placeholder="Поиск" oninput="loadAdminUsers(this.value)">
          <div id="sAdminList" style="max-height:200px;overflow-y:auto;margin-top:0.5rem"></div>
        </div>
        <button class="btn btn-d" onclick="logout()" style="width:100%;margin-top:0.5rem">Выйти</button>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header" id="chatHeader" style="display:none">
        <button class="icon-btn" id="backBtn" style="display:none" onclick="showTab('tab-chats')">←</button>
        <div class="header-user" onclick="toggleInfoPanel()">
          <div id="cAvatar" class="avatar" style="width:36px;height:36px"></div>
          <div style="min-width:0"><strong style="font-size:0.9rem" id="cNick"></strong><br><span style="font-size:0.7rem;color:var(--primary)" id="cAt"></span></div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="icon-btn" onclick="showAlert('📞 Звонок','Требуется сервер WebRTC')">📞</button>
          <button class="icon-btn" onclick="toggleInfoPanel()">ℹ️</button>
          <button class="icon-btn" onclick="closeChat()">✕</button>
        </div>
      </div>
      <div id="messagesContainer" class="messages-container"><div style="text-align:center;margin-top:30%;opacity:0.5"><div style="font-size:3rem">💬</div><p>Выберите диалог</p></div></div>
      <div class="input-area" id="inputArea" style="display:none">
        <input type="file" id="imageInput" accept="image/*" class="hidden-input" onchange="sendImage()">
        <button class="icon-btn" onclick="document.getElementById('imageInput').click()">📎</button>
        <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="btn btn-p btn-sm" onclick="sendMessage()">Отпр.</button>
      </div>
    </div>

    <div class="user-info-panel" id="infoPanel">
      <button class="btn btn-o btn-sm" style="align-self:flex-start;display:none" id="infoBack" onclick="toggleInfoPanel()">← Назад</button>
      <div id="iAvatar" class="avatar avatar-lg"></div>
      <h3 id="iNick"></h3><span style="color:var(--primary);font-size:0.85rem" id="iAt"></span>
      <span id="iBadge"></span><p style="color:var(--text2);text-align:center;font-size:0.85rem" id="iBio"></p>
      <div class="actions">
        <button class="btn btn-p btn-sm" id="actNick">Изменить ник</button>
        <button class="btn btn-w btn-sm" id="actBlock">Заблокировать</button>
        <button class="btn btn-d btn-sm" id="actRemove">Удалить из друзей</button>
        <button class="btn btn-s btn-sm" id="actShare">Поделиться контактом</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-tab="tab-chats" onclick="showTab('tab-chats')">💬<span>Диалоги</span></button>
    <button class="nav-item" data-tab="tab-search" onclick="showTab('tab-search')">🔍<span>Поиск</span></button>
    <button class="nav-item" data-tab="tab-settings" onclick="showTab('tab-settings')">⚙️<span>Настройки</span></button>
  </nav>

  <div class="modal-overlay" id="alertModal"><div class="modal"><h3 id="alertTitle"></h3><p id="alertMsg" style="margin-bottom:0.8rem;color:var(--text2);font-size:0.9rem"></p><div class="modal-btns"><button class="btn btn-p btn-sm" onclick="closeModal('alertModal')">OK</button></div></div></div>
  <div class="modal-overlay" id="promptModal"><div class="modal"><h3 id="promptTitle"></h3><p id="promptMsg" style="margin-bottom:0.8rem;color:var(--text2);font-size:0.9rem"></p><input type="text" id="promptInput"><div class="modal-btns"><button class="btn btn-o btn-sm" onclick="resolvePrompt(null)">Отмена</button><button class="btn btn-p btn-sm" onclick="resolvePrompt(document.getElementById('promptInput').value)">OK</button></div></div></div>
  <div class="modal-overlay" id="confirmModal"><div class="modal"><h3 id="confirmTitle"></h3><p id="confirmMsg" style="margin-bottom:0.8rem;color:var(--text2);font-size:0.9rem"></p><div class="modal-btns"><button class="btn btn-o btn-sm" onclick="resolveConfirm(false)">Отмена</button><button class="btn btn-p btn-sm" onclick="resolveConfirm(true)">OK</button></div></div></div>
  <div class="modal-overlay" id="cropModal"><div class="modal"><h3>Обрезать</h3><div style="border-radius:12px;overflow:hidden;margin-bottom:0.8rem;background:#000;display:flex"><img id="cropImage" src="" style="max-width:100%;max-height:250px;object-fit:contain"></div><input type="range" id="cropSize" min="50" max="100" value="100" style="width:100%;margin-bottom:0.8rem"><div class="modal-btns"><button class="btn btn-o btn-sm" onclick="closeModal('cropModal')">Отмена</button><button class="btn btn-p btn-sm" onclick="confirmCrop()">Готово</button></div></div></div>
  <div class="modal-overlay" id="friendModal"><div class="modal"><h3>Выберите друга</h3><div id="friendList" style="max-height:250px;overflow-y:auto"></div><div class="modal-btns"><button class="btn btn-o btn-sm" onclick="closeModal('friendModal')">Отмена</button></div></div></div>

  <script type="importmap">
    { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js", "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js", "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js" } }
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut, updateEmail, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCTIzwvGhQy5nZWlBHgCNOPeLbDRktuWtE", authDomain: "bordgram.firebaseapp.com", projectId: "bordgram", storageBucket: "bordgram.firebasestorage.app", messagingSenderId: "260333055054", appId: "1:260333055054:web:a73aac07c442dacd2be71f" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const CREATOR_USERNAME = "bordgram", CREATOR_PASSWORD = "09823065890dD";
    let currentUser = null, currentChatUser = null, currentChatId = null, messagesUnsubscribe = null, cropCallback = null, promptResolve = null, confirmResolve = null, activeChatsCache = new Map(), onlineInterval = null, searchTimeout = null;

    async function searchUsers(term,containerId){
      const rc=document.getElementById(containerId);if(!rc)return;

      if(containerId.includes('SearchResults'))rc.style.display='block';
      rc.innerHTML='<div class="spinner" style="margin:1rem auto"></div>';
      try{
        const t=term.startsWith('@')?term.substring(1).toLowerCase():term.toLowerCase();
        const snap=await getDocs(collection(db,'users'));const res=[];
        snap.forEach(ds=>{const u=ds.data();if(u.banned||u.uid===currentUser?.uid)return;if(u.username.toLowerCase().includes(t)||(u.nick||'').toLowerCase().includes(term.toLowerCase()))res.push({id:ds.id,...u})});
        rc.innerHTML='';if(!res.length){rc.innerHTML='<p style="padding:1rem;text-align:center;color:var(--text2);font-size:0.85rem">Не найдено</p>';return}
        res.slice(0,10).forEach(u=>{
          const item=document.createElement('div');item.className='chat-item';
          const av=document.createElement('div');av.className='avatar';renderAv(av,u);item.appendChild(av);
          item.innerHTML+=`<div style="flex:1"><span style="font-size:0.85rem">${u.nick||u.username}</span><br><span style="font-size:0.7rem;color:var(--primary)">@${u.username}</span></div>`;

          item.appendChild(add);rc.appendChild(item);
        });
      }catch(e){rc.innerHTML='<p style="padding:1rem;text-align:center;color:var(--text2)">Ошибка</p>'}
    }

    async function openChat(uid,ud=null){
      if(!uid||!currentUser||currentChatUser===uid)return;if(messagesUnsubscribe){messagesUnsubscribe();messagesUnsubscribe=null}currentChatUser=uid;currentChatId=[currentUser.uid,uid].sort().join('_');

    function renderMessages(ms){const c=document.getElementById('messagesContainer');const f=document.createDocumentFragment();ms.forEach(m=>{const d=document.createElement('div');d.className=`message ${m.senderId===currentUser.uid?'own':'other'}`;d.dataset.messageId=m.id;if(m.type==='forwarded'){d.innerHTML=`<div class="fwd">↗ От ${m.originalSender||''}</div>${m.imageUrl?`<img src="${m.imageUrl}" style="max-width:180px">`:m.text||''}`}else if(m.type==='contact_share'){d.innerHTML=`<div class="contact-card"><div class="avatar" style="width:36px;height:36px"></div><span style="font-size:0.85rem">${m.contactData?.nick||m.contactData?.username||'?'}</span></div>`;const a=d.querySelector('.avatar');if(a)renderAv(a,m.contactData||{});d.querySelector('.contact-card').onclick=()=>{if(m.contactData?.uid)openChat(m.contactData.uid)}}else if(m.type==='image'&&m.imageUrl){d.innerHTML=`<img src="${m.imageUrl}" style="max-width:200px" loading="lazy">`;d.querySelector('img').onclick=()=>{const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:9999';const im=new Image();im.src=m.imageUrl;im.style.cssText='max-width:90vw;max-height:90vh;border-radius:12px';ov.appendChild(im);ov.onclick=()=>ov.remove();document.body.appendChild(ov)}}else d.textContent=m.text||'';d.oncontextmenu=e=>{e.preventDefault();showCtx(e,m)};f.appendChild(d)});c.innerHTML='';c.appendChild(f);c.scrollTop=c.scrollHeight}

    document.addEventListener('paste',async e=>{if(!currentChatId||!currentUser)return;const items=e.clipboardData?.items;if(items)for(const it of items)if(it.type.startsWith('image/')){e.preventDefault();const b64=await fileToBase64(it.getAsFile());showCropModal(b64,async cr=>{await addDoc(collection(db,'messages',currentChatId,'messages'),{senderId:currentUser.uid,senderName:currentUser.nick||currentUser.username,type:'image',imageUrl:cr,timestamp:serverTimestamp()});await updateDoc(doc(db,'chats',currentChatId),{lastMessage:'📷 Фото',lastMessageTime:serverTimestamp()})})}});

    window.openSettings=function(){document.getElementById('sUsername').value=currentUser?.username||'';document.getElementById('sNick').value=currentUser?.nick||'';document.getElementById('sBio').value=currentUser?.bio||'';if(isMobile())showTab('tab-settings')}
    window.saveSettings=async function(){if(!currentUser)return;const nu=document.getElementById('sUsername').value.trim();const nick=document.getElementById('sNick').value.trim();const bio=document.getElementById('sBio').value.trim();const file=document.getElementById('sAvatarInput').files[0];try{if(nu&&nu!==currentUser.username){const snap=await getDocs(query(collection(db,'users'),where('username','==',nu),limit(1)));if(!snap.empty&&snap.docs[0].id!==currentUser.uid)throw new Error('@username занят');await updateDoc(doc(db,'users',currentUser.uid),{username:nu});currentUser.username=nu}if(nick){await updateDoc(doc(db,'users',currentUser.uid),{nick});currentUser.nick=nick}if(bio){await updateDoc(doc(db,'users',currentUser.uid),{bio});currentUser.bio=bio}if(file){const b64=await fileToBase64(file);showCropModal(b64,async cr=>{await updateDoc(doc(db,'users',currentUser.uid),{avatar:cr});currentUser.avatar=cr;updateAllUI()})}updateAllUI();document.getElementById('sMsg').textContent='✅ Сохранено!';setTimeout(()=>document.getElementById('sMsg').textContent='',2000)}catch(e){document.getElementById('sMsg').textContent='❌ '+e.message}}
    window.logout=async function(){stopOnline();await updateDoc(doc(db,'users',currentUser.uid),{online:false});await signOut(auth)}

    // Переключение вкладок авторизации
    window.switchAuthTab=function(tab){
      document.querySelectorAll('#authScreen .tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector(`#authScreen .tab-btn[onclick*="${tab}"]`)?.classList.add('active');
      document.getElementById('loginForm').classList.toggle('active',tab==='login');
      document.getElementById('registerForm').classList.toggle('active',tab==='register');
      document.getElementById('loginError').textContent='';document.getElementById('regError').textContent='';
    }

    window.handleLogin=async function(e){
      e.preventDefault();const login=document.getElementById('loginUsername').value.trim();const p=document.getElementById('loginPassword').value;
      if(!login||!p){document.getElementById('loginError').textContent='Заполните все поля';return}
      try{document.getElementById('loginError').textContent='';let snap;if(login.startsWith('@'))snap=await getDocs(query(collection(db,'users'),where('username','==',login.substring(1)),limit(1)));else{snap=await getDocs(query(collection(db,'users'),where('nick','==',login),limit(1)));if(snap.empty)snap=await getDocs(query(collection(db,'users'),where('username','==',login),limit(1)))}if(snap.empty)throw new Error('Пользователь не найден');const d=snap.docs[0].data();if(d.banned)throw new Error('Вы забанены');await signInWithEmailAndPassword(auth,d.email,p)}catch(e){document.getElementById('loginError').textContent='❌ '+e.message}
    }

    window.handleRegister=async function(e){
      e.preventDefault();const un=document.getElementById('regUsername').value.trim().replace('@','');const nick=document.getElementById('regNick').value.trim();const em=document.getElementById('regEmail').value.trim();const pw=document.getElementById('regPassword').value;const bio=document.getElementById('regBio').value.trim();
      if(!un||!nick||!em||!pw){document.getElementById('regError').textContent='Заполните все поля';return}if(!isValidUsername(un)){document.getElementById('regError').textContent='@username: латиница, цифры, _, 3-30 символов';return}if(pw.length<6){document.getElementById('regError').textContent='Пароль минимум 6 символов';return}
      try{document.getElementById('regError').textContent='';const snap=await getDocs(query(collection(db,'users'),where('username','==',un),limit(1)));if(!snap.empty)throw new Error('@username уже занят');const cred=await createUserWithEmailAndPassword(auth,em,pw);await updateProfile(cred.user,{displayName:nick});let av='';const file=document.getElementById('regAvatarInput').files[0];if(file)av=await fileToBase64(file);const badge=(un===CREATOR_USERNAME&&pw===CREATOR_PASSWORD)?'creator':'user';await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,username:un,nick,email:em,avatar:av,bio,badge,online:true,banned:false,lastSeen:serverTimestamp(),createdAt:serverTimestamp()});document.getElementById('regError').textContent='✅ Успешно! Войдите.';document.getElementById('registerForm').reset();setTimeout(()=>switchAuthTab('login'),2000)}catch(e){document.getElementById('regError').textContent='❌ '+e.message}
    }

    onAuthStateChanged(auth,async user=>{
      if(user){const ref=doc(db,'users',user.uid);let snap=await getDoc(ref);if(!snap.exists()){currentUser={uid:user.uid,username:user.displayName||'user',nick:user.displayName||'user',email:user.email,avatar:'',bio:'',badge:'user',online:true,banned:false};await setDoc(ref,{...currentUser,lastSeen:serverTimestamp(),createdAt:serverTimestamp()})}else currentUser={uid:user.uid,...snap.data()};if(currentUser.banned){await signOut(auth);showAlert('Бан','Вы забанены!');return}if(currentUser.username===CREATOR_USERNAME&&currentUser.badge!=='creator'){await updateDoc(ref,{badge:'creator'});currentUser.badge='creator'}await updateDoc(ref,{online:true,lastSeen:serverTimestamp()});startOnline();document.getElementById('authScreen').classList.remove('active');document.getElementById('messengerScreen').classList.add('active');updateAllUI();loadChats('dChats');loadChats('mChats');listenReqs();if(Notification.permission!=='granted'&&Notification.permission!=='denied')Notification.requestPermission()}else{document.getElementById('authScreen').classList.add('active');document.getElementById('messengerScreen').classList.remove('active');stopOnline();currentUser=null;if(messagesUnsubscribe){messagesUnsubscribe();messagesUnsubscribe=null}}
    });

    if(isMobile()){document.getElementById('backBtn').style.display='flex';document.getElementById('infoBack').style.display='block'}else{document.getElementById('backBtn').style.display='none';document.getElementById('infoBack').style.display='none'}
    window.addEventListener('resize',()=>{if(isMobile()){document.getElementById('backBtn').style.display='flex';document.getElementById('infoBack').style.display='block'}else{document.getElementById('backBtn').style.display='none';document.getElementById('infoBack').style.display='none'}});
  </script>
</body>
</html>
