<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BordGram — Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-gradient);
            color: var(--text);
        }

        /* темы */
        body, body[data-theme="dark"] {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --primary-glow: rgba(255, 107, 53, 0.4);
            --bg: #0a0a0f;
            --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            --surface: #1e1e2e;
            --surface-light: #2a2a3a;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --border: rgba(255, 107, 53, 0.25);
            --border-light: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --hover: rgba(255, 107, 53, 0.15);
            --input-bg: #2a2a3a;
            --typing: #4CAF50;
        }

        body[data-theme="orange"] {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --bg: #FFF3E8;
            --bg-gradient: linear-gradient(135deg, #FFF3E8 0%, #FFE4D6 100%);
            --surface: #FFFFFF;
            --surface-light: #FFF8F0;
            --text: #2C2C2C;
            --text-secondary: #666666;
            --border: #FFD9C4;
            --border-light: #FFE4D6;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --hover: #FFF0E8;
            --input-bg: #FFFFFF;
            --typing: #4CAF50;
        }

        body[data-theme="light"] {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --bg: #f5f5f5;
            --bg-gradient: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            --surface: #FFFFFF;
            --surface-light: #FAFAFA;
            --text: #2C2C2C;
            --text-secondary: #666666;
            --border: #E0E0E0;
            --border-light: #EEEEEE;
            --shadow: 0 8px 32px rgba(0,0,0,0.05);
            --hover: #F5F5F5;
            --input-bg: #FFFFFF;
            --typing: #4CAF50;
        }

        /* анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .screen {
            height: 100vh;
            width: 100%;
            animation: fadeIn 0.2s ease;
        }

        /* авторизация */
        .auth-container {
            max-width: 420px;
            margin: 0 auto;
            padding: 40px 30px;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo h1 {
            background: linear-gradient(135deg, var(--primary), #ffaa66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.8em;
        }

        .auth-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--surface-light);
            padding: 5px;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: 40px;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: white;
            background: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 18px;
        }

        .auth-form.active {
            display: flex;
        }

        .auth-form input, .auth-form textarea {
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
        }

        .auth-form input:focus, .auth-form textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .auth-form button {
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }

        .error-message {
            color: #ff4444;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            background: rgba(255,68,68,0.1);
            border-radius: 30px;
        }

        /* уведомления о заявках */
        .notification-container {
            position: fixed;
            top: 20px;
            left: 16px;
            right: 16px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .friend-request-notification {
            background: var(--surface);
            border-radius: 24px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            animation: fadeIn 0.2s;
        }

        .friend-request-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .friend-request-info {
            flex: 1;
        }

        .friend-request-name {
            font-weight: bold;
            font-size: 15px;
        }

        .friend-request-buttons {
            display: flex;
            gap: 8px;
        }

        .accept-friend-btn { background: #4CAF50; color: white; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
        .decline-friend-btn { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; }

        /* ===== ОСНОВНОЙ ИНТЕРФЕЙС ТЕЛЕФОНА ===== */
        #messengerScreen {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* верхняя панель */
        .app-header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            backdrop-filter: blur(10px);
        }

        .user-info-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-small-header {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .guest-avatar-small {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        /* нижняя навигация */
        .bottom-nav {
            background: var(--surface);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 12px;
            border-top: 1px solid var(--border-light);
            backdrop-filter: blur(10px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--text-secondary);
            transition: 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
            background: var(--hover);
        }

        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 11px; font-weight: 500; }

        /* контент вкладок */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* вкладка "Диалоги" */
        .chats-list {
            padding: 12px;
        }

        .chat-item {
            background: var(--surface);
            border-radius: 24px;
            margin-bottom: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .chat-item-delete {
            background: #ff4444;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
        }

        /* вкладка "Поиск" */
        .search-tab {
            padding: 16px;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 16px;
            margin-bottom: 16px;
        }

        .search-result-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .add-friend-btn {
            background: var(--primary);
            border: none;
            border-radius: 30px;
            color: white;
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
        }

        /* вкладка настроек */
        .settings-tab {
            padding: 16px;
        }

        .settings-section {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .settings-section h3 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 18px;
        }

        .settings-section input, .settings-section textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid var(--border);
            border-radius: 30px;
            background: var(--input-bg);
            color: var(--text);
            font-family: inherit;
        }

        .settings-section button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 8px;
        }

        .logout-btn { background: #ff4444 !important; }
        .theme-buttons { display: flex; gap: 10px; }
        .theme-btn { flex: 1; padding: 10px; border: 2px solid var(--border); background: var(--surface); border-radius: 30px; cursor: pointer; }

        .user-admin-item {
            background: var(--hover);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .verify-small, .ban-small { padding: 5px 12px; border-radius: 30px; border: none; cursor: pointer; font-size: 11px; }
        .verify-small { background: #4CAF50; color: white; }
        .ban-small { background: #ff8800; color: white; }

        /* экран чата (выезжающий) */
        .chat-view {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-gradient);
            z-index: 200;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .chat-view.open {
            transform: translateX(0);
        }

        .chat-header-custom {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .back-btn {
            background: transparent;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 20px;
        }

        .message.own {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.other {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .message-header {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .typing-status {
            padding: 8px 16px;
            font-size: 12px;
            color: var(--typing);
            font-style: italic;
        }

        .message-input-container {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid var(--border-light);
        }

        .message-input-container input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 16px;
        }

        .send-message-btn {
            background: var(--primary);
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 20px;
            color: white;
            cursor: pointer;
        }

        .empty-message { text-align: center; padding: 40px; opacity: 0.6; }

        .emoji-picker {
            position: fixed;
            bottom: 90px;
            left: 10px;
            right: 10px;
            background: var(--surface);
            border-radius: 28px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            z-index: 300;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .emoji-picker span { font-size: 28px; cursor: pointer; text-align: center; padding: 6px; }
    </style>
</head>
<body>
<div id="authScreen" class="screen">
    <div class="auth-container">
        <div class="logo"><h1>🚀 BordGram</h1><p>Общайся с друзьями</p></div>
        <div class="auth-tabs"><button class="tab-btn active" data-tab="login">Вход</button><button class="tab-btn" data-tab="register">Регистрация</button></div>
        <form id="loginForm" class="auth-form active">
            <input type="text" id="loginUsername" placeholder="👤 Имя пользователя" required>
            <input type="password" id="loginPassword" placeholder="🔑 Пароль" required>
            <button type="submit">🔑 Войти</button>
            <div id="loginError" class="error-message"></div>
        </form>
        <form id="registerForm" class="auth-form">
            <input type="text" id="regUsername" placeholder="👤 Имя пользователя" required>
            <input type="email" id="regEmail" placeholder="📧 Email" required>
            <input type="password" id="regPassword" placeholder="🔑 Пароль (мин. 6 символов)" required>
            <input type="file" id="regAvatar" accept="image/*">
            <textarea id="regBio" placeholder="📝 О себе" rows="3"></textarea>
            <button type="submit">📝 Зарегистрироваться</button>
            <div id="regError" class="error-message"></div>
        </form>
    </div>
</div>

<div id="notificationContainer" class="notification-container"></div>

<div id="messengerScreen" class="screen" style="display: none;">
    <div class="app-header">
        <div class="user-info-header"><div id="headerAvatar"></div><div><strong id="headerUsername"></strong><span id="headerBadge"></span></div></div>
        <button id="settingsBtnHeader" class="icon-btn" style="background:transparent; border:none; font-size:26px;">⚙️</button>
    </div>

    <div class="tab-content active" id="chatsTab"><div class="chats-list" id="chatsContainer"></div></div>
    <div class="tab-content" id="searchTab">
        <div class="search-tab">
            <input type="text" id="searchUserInput" class="search-input" placeholder="🔍 Имя пользователя...">
            <div id="searchResultsList"></div>
        </div>
    </div>
    <div class="tab-content" id="settingsTab">
        <div class="settings-tab">
            <div class="settings-section"><h3>👤 Профиль</h3><input type="text" id="profileUsername" placeholder="Новое имя"><input type="email" id="profileEmail" placeholder="Новый Email"><input type="password" id="profilePassword" placeholder="Новый пароль"><textarea id="profileBio" placeholder="О себе" rows="2"></textarea><button id="updateProfileMobileBtn">💾 Сохранить</button><div id="profileMobileMsg" class="error-message"></div></div>
            <div class="settings-section"><h3>🖼️ Аватарка</h3><input type="file" id="mobileAvatarInput" accept="image/*"><button id="updateAvatarMobileBtn">📸 Обновить</button></div>
            <div class="settings-section"><h3>🎨 Тема</h3><div class="theme-buttons"><button class="theme-btn" data-theme="orange">🟠 Оранж</button><button class="theme-btn" data-theme="dark">🌙 Тёмная</button><button class="theme-btn" data-theme="light">☀️ Белая</button></div></div>
            <div class="settings-section" id="adminMobileSection" style="display: none;"><h3>👑 Админ панель</h3><div id="adminUsersList"></div></div>
            <div class="settings-section"><button id="logoutMobileBtn" class="logout-btn">🚪 Выйти</button></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" data-tab="chats"><span class="nav-icon">💬</span><span class="nav-label">Диалоги</span></button>
        <button class="nav-item" data-tab="search"><span class="nav-icon">🔍</span><span class="nav-label">Найти</span></button>
        <button class="nav-item" data-tab="settings"><span class="nav-icon">⚙️</span><span class="nav-label">Настройки</span></button>
    </div>

    <!-- Чат (выезжающий экран) -->
    <div id="chatView" class="chat-view">
        <div class="chat-header-custom"><button id="closeChatBtn" class="back-btn">←</button><div><strong id="chatViewUsername"></strong><div id="chatViewStatus" style="font-size:11px"></div><div id="chatViewTyping" style="font-size:11px; color:var(--typing)"></div></div></div>
        <div id="chatMessagesArea" class="messages-area"><div class="empty-message">Выберите чат</div></div>
        <div class="message-input-container">
            <button id="chatEmojiBtn" style="background:transparent; border:none; font-size:26px;">😊</button>
            <button id="chatFileBtn" style="background:transparent; border:none; font-size:26px;">📎</button>
            <input type="file" id="chatFileInput" style="display:none" accept="image/*">
            <input type="text" id="chatMessageInput" placeholder="Сообщение...">
            <button id="chatSendBtn" class="send-message-btn">➤</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut, updateEmail, updatePassword } from "firebase/auth";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, query, where, orderBy, onSnapshot, addDoc, serverTimestamp, limit, deleteDoc } from "firebase/firestore";

    const firebaseConfig = {
        apiKey: "AIzaSyCTIzwvGhQy5nZWlBHgCNOPeLbDRktuWtE",
        authDomain: "bordgram.firebaseapp.com",
        projectId: "bordgram",
        storageBucket: "bordgram.firebasestorage.app",
        messagingSenderId: "260333055054",
        appId: "1:260333055054:web:a73aac07c442dacd2be71f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const CREATOR_USERNAME = "BordGram";
    const CREATOR_PASSWORD = "09823065890dD";

    let currentUser = null;
    let currentChatUser = null;
    let currentChatId = null;
    let messagesUnsubscribe = null;
    let chatsUnsubscribe = null;
    let typingTimeout = null;

    function getAvatarUrl(avatar) { return (avatar && (avatar.startsWith('data:') || avatar.startsWith('http'))) ? avatar : null; }
    function getInitials(name) { return name ? name.charAt(0).toUpperCase() : '?'; }
    function fileToBase64(file) { return new Promise((resolve, reject) => { const r = new FileReader(); r.readAsDataURL(file); r.onload = () => resolve(r.result); r.onerror = reject; }); }
    function escapeHtml(s) { if(!s) return ''; const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }

    // ---------- ЗАЯВКИ В ДРУЗЬЯ ----------
    async function sendFriendRequest(toUserId, toName) {
        const chatId = [currentUser.uid, toUserId].sort().join('_');
        const chatDoc = await getDoc(doc(db, 'chats', chatId));
        if (chatDoc.exists() && !chatDoc.data().isFriendRequest) { alert('❌ Уже в друзьях'); return; }
        const existingReqs = await getDocs(query(collection(db, 'friendRequests'), where('from', '==', currentUser.uid), where('to', '==', toUserId), where('status', '==', 'pending')));
        if (!existingReqs.empty) { alert('❌ Заявка уже отправлена'); return; }
        const requestId = `${currentUser.uid}_${toUserId}_${Date.now()}`;
        await setDoc(doc(db, 'friendRequests', requestId), { from: currentUser.uid, fromName: currentUser.username, fromAvatar: currentUser.avatar || '', to: toUserId, toName, status: 'pending', createdAt: serverTimestamp() });
        alert(`✅ Заявка отправлена ${toName}`);
    }

    function showNotification(requestId, fromUserId, fromName, fromAvatar) {
        const container = document.getElementById('notificationContainer');
        if (document.querySelector(`[data-rid="${requestId}"]`)) return;
        const notif = document.createElement('div');
        notif.className = 'friend-request-notification';
        notif.setAttribute('data-rid', requestId);
        notif.innerHTML = `<img src="${fromAvatar || 'https://via.placeholder.com/48'}" class="friend-request-avatar"><div class="friend-request-info"><div class="friend-request-name">${escapeHtml(fromName)}</div><div class="friend-request-text">👋 Хочет добавить вас в друзья!</div></div><div class="friend-request-buttons"><button class="accept-friend-btn" data-uid="${fromUserId}" data-rid="${requestId}">✅ Принять</button><button class="decline-friend-btn" data-uid="${fromUserId}" data-rid="${requestId}">❌ Отклонить</button></div>`;
        container.appendChild(notif);
        notif.querySelector('.accept-friend-btn').onclick = async () => { await acceptRequest(requestId, fromUserId); notif.remove(); };
        notif.querySelector('.decline-friend-btn').onclick = async () => { await declineRequest(requestId); notif.remove(); };
        setTimeout(() => notif.remove(), 30000);
    }

    async function acceptRequest(requestId, fromUserId) {
        await updateDoc(doc(db, 'friendRequests', requestId), { status: 'accepted' });
        const chatId = [currentUser.uid, fromUserId].sort().join('_');
        if (!(await getDoc(doc(db, 'chats', chatId))).exists()) {
            await setDoc(doc(db, 'chats', chatId), { participants: [currentUser.uid, fromUserId], createdAt: serverTimestamp(), lastMessage: '✅ Вы друзья!', lastMessageTime: serverTimestamp() });
        }
        alert('✅ Дружба подтверждена!');
    }
    async function declineRequest(requestId) { await updateDoc(doc(db, 'friendRequests', requestId), { status: 'declined' }); alert('❌ Заявка отклонена'); }

    async function deleteChat(chatId, otherId) { if (confirm('Удалить чат?')) { await deleteDoc(doc(db, 'chats', chatId)); if (currentChatUser === otherId) closeChatView(); } }

    // ---------- ПЕЧАТАЕТ ----------
    async function setTyping(isTyping) { if (currentChatId) await updateDoc(doc(db, 'chats', currentChatId), { typing: isTyping ? currentUser.uid : null, typingName: isTyping ? currentUser.username : null }); }
    function listenTyping() { if (!currentChatId) return () => {}; return onSnapshot(doc(db, 'chats', currentChatId), (doc) => { const data = doc.data(); document.getElementById('chatViewTyping').innerHTML = (data?.typing && data.typing !== currentUser.uid) ? `✍️ ${data.typingName} печатает...` : ''; }); }

    // ---------- СОЗДАТЕЛЬ ----------
    async function ensureCreator() {
        const q = query(collection(db, 'users'), where('username', '==', CREATOR_USERNAME), limit(1));
        if (!(await getDocs(q)).empty) return;
        const email = `creator_${Date.now()}@bordgram.com`;
        const cred = await createUserWithEmailAndPassword(auth, email, CREATOR_PASSWORD);
        await updateProfile(cred.user, { displayName: CREATOR_USERNAME });
        await setDoc(doc(db, 'users', cred.user.uid), { uid: cred.user.uid, username: CREATOR_USERNAME, email, avatar: '', bio: '👑 Основатель BordGram', badge: 'creator', online: true, banned: false, createdAt: serverTimestamp() });
        await signOut(auth);
    }

    // ---------- ДИАЛОГИ (список) ----------
    function loadChatsList() {
        if (chatsUnsubscribe) chatsUnsubscribe();
        const q = query(collection(db, 'chats'), where('participants', 'array-contains', currentUser.uid), orderBy('lastMessageTime', 'desc'));
        chatsUnsubscribe = onSnapshot(q, async (snapshot) => {
            const container = document.getElementById('chatsContainer');
            container.innerHTML = '';
            for (const chatDoc of snapshot.docs) {
                const chat = chatDoc.data();
                if (chat.isFriendRequest) continue;
                const otherId = chat.participants.find(id => id !== currentUser.uid);
                if (!otherId) continue;
                const otherDoc = await getDoc(doc(db, 'users', otherId));
                const user = otherDoc.data();
                if (user && !user.banned) {
                    const avatarUrl = getAvatarUrl(user.avatar);
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `<div class="chat-item-left">${avatarUrl ? `<img src="${avatarUrl}" style="width:48px;height:48px;border-radius:50%">` : `<div class="guest-avatar-small" style="width:48px;height:48px;font-size:18px">${getInitials(user.username)}</div>`}<div><strong>${escapeHtml(user.username)}</strong><div style="font-size:12px">${escapeHtml(chat.lastMessage?.substring(0,30) || '')}</div></div></div><button class="chat-item-delete" data-chat="${chatDoc.id}" data-other="${otherId}">🗑️</button>`;
                    div.querySelector('.chat-item-left').onclick = () => openChatView(otherId, user);
                    div.querySelector('.chat-item-delete').onclick = (e) => { e.stopPropagation(); deleteChat(chatDoc.id, otherId); };
                    container.appendChild(div);
                }
            }
            if (!container.children.length) container.innerHTML = '<div style="text-align:center;padding:20px">🤝 Нет диалогов. Начните дружить!</div>';
        });
    }

    // ---------- ПОИСК (теперь видит ВСЕХ, даже создателя) ----------
    async function performSearch(term) {
        const resultsDiv = document.getElementById('searchResultsList');
        if (term.length < 2) { resultsDiv.innerHTML = ''; return; }
        const q = query(collection(db, 'users'), where('username', '>=', term), where('username', '<=', term + '\uf8ff'), limit(20));
        const snap = await getDocs(q);
        resultsDiv.innerHTML = '';
        for (const docSnap of snap.docs) {
            const u = docSnap.data();
            if (u.uid === currentUser.uid) continue;
            if (u.banned) continue;
            const avatarUrl = getAvatarUrl(u.avatar);
            const badgeHtml = u.badge === 'creator' ? '👑 ' : (u.badge === 'verified' ? '✅ ' : '');
            const card = document.createElement('div');
            card.className = 'search-result-card';
            card.innerHTML = `<div style="display:flex; gap:12px; align-items:center;"><div>${avatarUrl ? `<img src="${avatarUrl}" style="width:44px;height:44px;border-radius:50%">` : `<div class="guest-avatar-small" style="width:44px;height:44px;">${getInitials(u.username)}</div>`}</div><div><strong>${badgeHtml}${escapeHtml(u.username)}</strong><div style="font-size:12px; opacity:0.7">${escapeHtml(u.bio || '')}</div><div style="font-size:10px;">${u.online ? '🟢 онлайн' : '⚫ офлайн'}</div></div></div><button class="add-friend-btn" data-uid="${u.uid}" data-name="${u.username}">➕ Добавить</button>`;
            resultsDiv.appendChild(card);
        }
        if (!resultsDiv.children.length) resultsDiv.innerHTML = '<div style="text-align:center; padding:20px;">❌ Пользователи не найдены</div>';
        document.querySelectorAll('.add-friend-btn').forEach(btn => btn.onclick = async (e) => { e.stopPropagation(); await sendFriendRequest(btn.dataset.uid, btn.dataset.name); btn.textContent = '✓'; btn.disabled = true; });
    }

    // ---------- ЧАТ (открыть) ----------
    async function openChatView(userId, user) {
        currentChatUser = userId;
        currentChatId = [currentUser.uid, userId].sort().join('_');
        document.getElementById('chatViewUsername').innerHTML = escapeHtml(user.username);
        document.getElementById('chatViewStatus').innerHTML = user.online ? '🟢 Онлайн' : '⚫ Офлайн';
        document.getElementById('chatView').classList.add('open');
        if (messagesUnsubscribe) messagesUnsubscribe();
        const messagesRef = collection(db, 'messages', currentChatId, 'messages');
        messagesUnsubscribe = onSnapshot(query(messagesRef, orderBy('timestamp', 'asc')), (snap) => {
            const area = document.getElementById('chatMessagesArea');
            if (snap.empty) { area.innerHTML = '<div class="empty-message">💬 Напишите первое сообщение</div>'; return; }
            area.innerHTML = '';
            snap.forEach(msgDoc => {
                const m = msgDoc.data();
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${m.senderId === currentUser.uid ? 'own' : 'other'}`;
                let content = '';
                if (m.type === 'text') content = `<div>${escapeHtml(m.text)}</div>`;
                else if (m.type === 'image') content = `<img src="${m.base64}" style="max-width:180px; border-radius:16px; cursor:pointer" onclick="window.open('${m.base64}')">`;
                msgDiv.innerHTML = `<div class="message-header"><span>${escapeHtml(m.senderName)}</span><span>${m.timestamp?.toDate().toLocaleTimeString()}</span></div>${content}`;
                area.appendChild(msgDiv);
            });
            area.scrollTop = area.scrollHeight;
        });
        listenTyping();
    }

    function closeChatView() { document.getElementById('chatView').classList.remove('open'); if (messagesUnsubscribe) messagesUnsubscribe(); currentChatUser = null; currentChatId = null; }
    async function sendChatMessage(type, content, fn = '') {
        if (!currentChatId) return;
        const msg = { senderId: currentUser.uid, senderName: currentUser.username, type, timestamp: serverTimestamp() };
        if (type === 'text') msg.text = content; else { msg.base64 = content; msg.fileName = fn; }
        await addDoc(collection(db, 'messages', currentChatId, 'messages'), msg);
        await updateDoc(doc(db, 'chats', currentChatId), { lastMessage: type === 'text' ? content.substring(0,40) : `[${type === 'image' ? '📷 Фото' : '📎 Файл'}]`, lastMessageTime: serverTimestamp() });
    }

    // ---------- АДМИНКА (для создателя) ----------
    async function loadAdminUsers() {
        const users = await getDocs(collection(db, 'users'));
        const container = document.getElementById('adminUsersList');
        container.innerHTML = '';
        users.forEach(docSnap => {
            const u = docSnap.data();
            if (u.uid === currentUser.uid) return;
            const div = document.createElement('div');
            div.className = 'user-admin-item';
            div.innerHTML = `<div style="flex:1"><strong>${escapeHtml(u.username)}</strong><div style="font-size:10px">${escapeHtml(u.email)}</div>${u.badge === 'creator' ? '👑 ' : (u.badge === 'verified' ? '✅ ' : '')}</div><button class="verify-small" data-uid="${u.uid}" data-verified="${u.badge === 'verified'}">${u.badge === 'verified' ? '🔹 Убрать' : '✅ Выдать'}</button><button class="ban-small" data-uid="${u.uid}" data-banned="${u.banned || false}">${u.banned ? '🔓 Разбан' : '⛔ Бан'}</button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.verify-small').forEach(btn => btn.onclick = async () => { await updateDoc(doc(db, 'users', btn.dataset.uid), { badge: btn.dataset.verified === 'true' ? 'user' : 'verified' }); loadAdminUsers(); });
        document.querySelectorAll('.ban-small').forEach(btn => btn.onclick = async () => { await updateDoc(doc(db, 'users', btn.dataset.uid), { banned: !(btn.dataset.banned === 'true') }); loadAdminUsers(); });
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ UI ----------
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`${tabId}Tab`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
        if (tabId === 'chats') loadChatsList();
        if (tabId === 'settings' && currentUser?.badge === 'creator') loadAdminUsers();
    }

    function updateHeader() {
        document.getElementById('headerUsername').innerHTML = escapeHtml(currentUser.username);
        const avatarUrl = getAvatarUrl(currentUser.avatar);
        const container = document.getElementById('headerAvatar');
        if (avatarUrl) container.innerHTML = `<img src="${avatarUrl}" class="avatar-small-header" onerror="this.src='https://via.placeholder.com/44'">`;
        else container.innerHTML = `<div class="guest-avatar-small">${getInitials(currentUser.username)}</div>`;
        const badgeSpan = document.getElementById('headerBadge');
        if (currentUser.badge === 'creator') badgeSpan.innerHTML = ' 👑';
        else if (currentUser.badge === 'verified') badgeSpan.innerHTML = ' ✅';
        else badgeSpan.innerHTML = '';
        if (currentUser.badge === 'creator') document.getElementById('adminMobileSection').style.display = 'block';
    }

    // ---------- СЛУШАТЕЛИ ----------
    document.getElementById('searchUserInput')?.addEventListener('input', (e) => performSearch(e.target.value.trim()));
    document.getElementById('settingsBtnHeader')?.addEventListener('click', () => switchTab('settings'));
    document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
    document.getElementById('closeChatBtn')?.addEventListener('click', closeChatView);
    document.getElementById('chatSendBtn')?.addEventListener('click', () => { const inp = document.getElementById('chatMessageInput'); if (inp.value.trim()) { sendChatMessage('text', inp.value); inp.value = ''; setTyping(false); if (typingTimeout) clearTimeout(typingTimeout); } });
    document.getElementById('chatMessageInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('chatSendBtn').click(); });
    let lastTypingTime = 0;
    document.getElementById('chatMessageInput')?.addEventListener('input', () => { const now = Date.now(); if (now - lastTypingTime > 1800) { setTyping(true); lastTypingTime = now; if (typingTimeout) clearTimeout(typingTimeout); typingTimeout = setTimeout(() => setTyping(false), 2500); } });
    document.getElementById('chatFileBtn')?.addEventListener('click', () => document.getElementById('chatFileInput').click());
    document.getElementById('chatFileInput')?.addEventListener('change', async (e) => { const f = e.target.files[0]; if (!f) return; const b64 = await fileToBase64(f); if (f.type.startsWith('image/')) sendChatMessage('image', b64, f.name); e.target.value = ''; });
    let emojiPicker = null;
    document.getElementById('chatEmojiBtn')?.addEventListener('click', () => { if (emojiPicker) { emojiPicker.remove(); emojiPicker = null; return; } emojiPicker = document.createElement('div'); emojiPicker.className = 'emoji-picker'; '😀😂😍😎👍❤️🔥🎉😢😡🥳🤔'.split('').forEach(e => { const s = document.createElement('span'); s.textContent = e; s.onclick = () => { document.getElementById('chatMessageInput').value += e; emojiPicker.remove(); emojiPicker = null; }; emojiPicker.appendChild(s); }); document.body.appendChild(emojiPicker); });
    document.getElementById('updateProfileMobileBtn')?.addEventListener('click', async () => { const nu = document.getElementById('profileUsername').value; const ne = document.getElementById('profileEmail').value; const np = document.getElementById('profilePassword').value; const bio = document.getElementById('profileBio').value; const msg = document.getElementById('profileMobileMsg'); try { if (nu) { await updateDoc(doc(db, 'users', currentUser.uid), { username: nu }); currentUser.username = nu; updateHeader(); } if (bio) await updateDoc(doc(db, 'users', currentUser.uid), { bio }); if (ne && auth.currentUser) await updateEmail(auth.currentUser, ne); if (np && auth.currentUser) await updatePassword(auth.currentUser, np); msg.innerHTML = '✅ Обновлено!'; msg.style.color = '#4CAF50'; setTimeout(() => msg.innerHTML = '', 2000); } catch(e) { msg.innerHTML = '❌ ' + e.message; } });
    document.getElementById('updateAvatarMobileBtn')?.addEventListener('click', async () => { const f = document.getElementById('mobileAvatarInput').files[0]; if (!f) return; const b64 = await fileToBase64(f); await updateDoc(doc(db, 'users', currentUser.uid), { avatar: b64 }); currentUser.avatar = b64; updateHeader(); alert('✅ Аватар обновлён'); });
    document.getElementById('logoutMobileBtn')?.addEventListener('click', async () => { if (currentUser) await updateDoc(doc(db, 'users', currentUser.uid), { online: false }); await signOut(auth); });
    document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => { document.body.setAttribute('data-theme', btn.dataset.theme); localStorage.setItem('theme', btn.dataset.theme); }));
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => { e.preventDefault(); const uname = document.getElementById('loginUsername').value, pwd = document.getElementById('loginPassword').value; try { const q = query(collection(db, 'users'), where('username', '==', uname), limit(1)); const snap = await getDocs(q); if (snap.empty) throw new Error('Не найден'); const u = snap.docs[0].data(); if (u.banned) throw new Error('Забанен'); await signInWithEmailAndPassword(auth, u.email, pwd); } catch(e) { document.getElementById('loginError').innerHTML = '❌ ' + e.message; } });
    document.getElementById('registerForm')?.addEventListener('submit', async (e) => { e.preventDefault(); const uname = document.getElementById('regUsername').value, email = document.getElementById('regEmail').value, pwd = document.getElementById('regPassword').value, avatar = document.getElementById('regAvatar').files[0], bio = document.getElementById('regBio').value; if (pwd.length < 6) { document.getElementById('regError').innerHTML = '❌ 6+ символов'; return; } try { const cred = await createUserWithEmailAndPassword(auth, email, pwd); await updateProfile(cred.user, { displayName: uname }); let avatarUrl = ''; if (avatar) avatarUrl = await fileToBase64(avatar); const badge = (uname === CREATOR_USERNAME && pwd === CREATOR_PASSWORD) ? 'creator' : 'user'; await setDoc(doc(db, 'users', cred.user.uid), { uid: cred.user.uid, username: uname, email, avatar: avatarUrl, bio: bio || '', badge, online: true, banned: false, createdAt: serverTimestamp() }); document.getElementById('regError').innerHTML = '✅ Регистрация успешна! Войдите.'; setTimeout(() => document.getElementById('regError').innerHTML = '', 2500); } catch(e) { document.getElementById('regError').innerHTML = '❌ ' + e.message; } });
    document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => { const tab = btn.dataset.tab; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active')); document.getElementById(`${tab}Form`).classList.add('active'); });

    function listenRequests() { const q = query(collection(db, 'friendRequests'), where('to', '==', currentUser.uid), where('status', '==', 'pending')); onSnapshot(q, (snap) => { snap.docChanges().forEach(change => { if (change.type === 'added') { const req = change.doc.data(); showNotification(change.doc.id, req.from, req.fromName, req.fromAvatar); } }); }); }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    ensureCreator();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            let userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!userDoc.exists()) { await setDoc(doc(db, 'users', user.uid), { uid: user.uid, username: user.displayName || user.email.split('@')[0], email: user.email, avatar: '', bio: '', badge: 'user', online: true, banned: false, createdAt: serverTimestamp() }); userDoc = await getDoc(doc(db, 'users', user.uid)); }
            currentUser = { uid: user.uid, ...userDoc.data() };
            if (currentUser.banned) { await signOut(auth); alert('⛔ Бан'); return; }
            await updateDoc(doc(db, 'users', user.uid), { online: true });
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('messengerScreen').style.display = 'flex';
            updateHeader();
            loadChatsList();
            listenRequests();
            switchTab('chats');
        } else { document.getElementById('authScreen').style.display = 'block'; document.getElementById('messengerScreen').style.display = 'none'; if (messagesUnsubscribe) messagesUnsubscribe(); if (chatsUnsubscribe) chatsUnsubscribe(); closeChatView(); currentUser = null; }
    });
</script>
</body>
</html>
